<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Dice Arena</title>
    
    <style>
        /* matching your "Dragonshard" theme */
        body { 
            margin: 0; background: #0a0002; color: white; font-family: 'serif'; 
            overflow: hidden; height: 100vh; width: 100vw;
            background-image: radial-gradient(circle, #1a0005 0%, #000000 100%);
        }

        #dice-box { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* Nav & UI */
        .back-nav {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            color: #ff3366; text-decoration: none; text-transform: uppercase; 
            letter-spacing: 2px; font-size: 11px; border: 1px solid rgba(255, 51, 102, 0.3);
            padding: 8px 15px; border-radius: 20px; background: rgba(10, 0, 2, 0.6);
            backdrop-filter: blur(5px);
        }

        .controls { 
            position: absolute; bottom: 40px; width: 100%; text-align: center; 
            z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .button-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .roll-btn {
            background: rgba(40, 0, 10, 0.6); border: 1px solid #ff3366; color: #ffcccc;
            padding: 12px 25px; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; border-radius: 4px; transition: all 0.4s ease; font-size: 12px;
        }
        .roll-btn:hover { background: #ff3366; color: white; box-shadow: 0 0 20px #ff3366; }

        #log {
            position: absolute; top: 20px; right: 20px; text-align: right;
            font-size: 12px; color: rgba(255, 255, 255, 0.5); z-index: 100;
            pointer-events: none; max-height: 200px; overflow: hidden;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-nav">← Exit Arena</a>
    <div id="log"></div>
    <div id="dice-box"></div>

    <div class="controls">
        <div class="button-group">
            <button class="roll-btn" onclick="triggerRoll('1d20')">Roll D20</button>
            <button class="roll-btn" onclick="triggerRoll('2d6')">Roll 2D6</button>
            <button class="roll-btn" onclick="triggerRoll('1d100')">Roll D100</button>
            <button class="roll-btn" onclick="clearDice()">Clear Table</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "dice-box": "https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/dice-box.es.js"
        }
    }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import DiceBox from 'dice-box';
        
        // 1. Import config from your hidden file
        import { firebaseConfig } from './config.js';

        // 2. Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const rollsRef = ref(db, "shared_rolls");

        // 3. Set Player Identity (Simple prompt for now)
        let playerName = localStorage.getItem('dragonshard_name');
        if (!playerName) {
            playerName = prompt("Identify yourself, Traveler:") || "Anonymous";
            localStorage.setItem('dragonshard_name', playerName);
        }

        // 4. Initialize 3D Dice
        const Box = new DiceBox("#dice-box", {
            assetPath: "https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/assets/",
            theme: "rust", 
            offscreen: true,
            scale: 5
        });

        await Box.init();

        // 5. Shared Logic: Listen for rolls from the database
        onChildAdded(rollsRef, (snapshot) => {
            const data = snapshot.val();
            const now = Date.now();
            
            // Only roll if the event is fresh (last 10 seconds)
            if (data.timestamp && (now - data.timestamp) < 10000) {
                Box.roll(data.notation);
                updateLog(`${data.user} manifested ${data.notation}`);
            }
        });

        // 6. User Actions
        window.triggerRoll = (notation) => {
            push(rollsRef, {
                user: playerName,
                notation: notation,
                timestamp: serverTimestamp()
            });
        };

        window.clearDice = () => Box.clear();

        // UI Feedback
        function updateLog(msg) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.innerText = msg;
            log.prepend(entry);
        }

        // Clear dice on screen tap
        Box.onCanvasClick = () => Box.clear();
    </script>
</body>
</html>
