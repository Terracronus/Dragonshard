<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Dice Arena</title>
    <style>
        body { 
            margin: 0; 
            background: #0a0002; 
            color: white; 
            font-family: 'serif'; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            background-image: radial-gradient(circle, #1a0005 0%, #000000 100%); 
        }

        #dice-box { 
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh; 
            z-index: 1; 
        }
        #dice-box canvas {
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }

        /* Result overlay — shows the authoritative seeded result */
        #result-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            z-index: 200;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #result-overlay.visible { opacity: 1; }

        #result-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff3366;
            margin-bottom: 8px;
        }
        #result-number {
            font-size: 96px;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 40px #ff3366, 0 0 80px #ff3366;
        }
        #result-breakdown {
            font-size: 14px;
            color: #ffaaaa;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .controls { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .roll-btn { background: rgba(40, 0, 10, 0.6); border: 1px solid #ff3366; color: #ffcccc; padding: 12px 25px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 4px; transition: all 0.4s ease; font-size: 12px; }
        .roll-btn:hover { background: #ff3366; color: white; box-shadow: 0 0 20px #ff3366; }
        .roll-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #status { position: absolute; top: 20px; right: 20px; color: #ffcccc; font-size: 12px; z-index: 100; pointer-events: none; }
        .back-nav { position: absolute; top: 20px; left: 20px; z-index: 100; color: #ff3366; text-decoration: none; font-size: 11px; border: 1px solid rgba(255, 51, 102, 0.3); padding: 8px 15px; border-radius: 20px; background: rgba(10, 0, 2, 0.6); text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-nav">← Exit Arena</a>

    <div id="status">Loading Engine...</div>
    <div id="dice-box"></div>

    <!-- Authoritative result shown on top of the animation -->
    <div id="result-overlay">
        <div id="result-label">—</div>
        <div id="result-number">—</div>
        <div id="result-breakdown"></div>
    </div>

    <div class="controls">
        <div class="button-group">
            <button id="btn-d20" class="roll-btn">Roll D20</button>
            <button id="btn-2d6" class="roll-btn">Roll 2D6</button>
            <button id="btn-clear" class="roll-btn">Clear</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import DiceBox from "https://terracronus.github.io/Dragonshard/assets/dice-box/dice-box.es.min.js";

        // ─── Seeded RNG (Mulberry32) ───────────────────────────────────────────────
        // Converts the seed string into a deterministic integer hash.
        function seedToInt(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) {
                h = Math.imul(31, h) + str.charCodeAt(i) | 0;
            }
            return h >>> 0;
        }

        // Returns a fast, high-quality PRNG function from a numeric seed.
        function mulberry32(seed) {
            return function() {
                seed |= 0; seed = seed + 0x6D2B79F5 | 0;
                let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        // Roll `count`d`sides` using the seed. Returns { total, rolls }.
        // Identical on every device for the same seed string — guaranteed.
        function seededRoll(notation, seedStr) {
            const match = notation.match(/^(\d+)d(\d+)$/i);
            if (!match) return null;
            const count = parseInt(match[1]);
            const sides = parseInt(match[2]);
            const rng   = mulberry32(seedToInt(seedStr));
            const rolls = Array.from({ length: count }, () => Math.floor(rng() * sides) + 1);
            return { total: rolls.reduce((a, b) => a + b, 0), rolls };
        }
        // ──────────────────────────────────────────────────────────────────────────

        const statusEl    = document.getElementById('status');
        const overlay     = document.getElementById('result-overlay');
        const labelEl     = document.getElementById('result-label');
        const numberEl    = document.getElementById('result-number');
        const breakdownEl = document.getElementById('result-breakdown');
        const buttons     = document.querySelectorAll('.roll-btn');

        const setReady = (ready) => buttons.forEach(b => b.disabled = !ready);
        setReady(false);

        const makeSeed = () => Math.random().toString(36).substring(2, 10);

        let hideTimer = null;

        function showResult(notation, seedStr) {
            const result = seededRoll(notation, seedStr);
            if (!result) return;
            const match = notation.match(/^(\d+)d(\d+)$/i);
            const count = parseInt(match[1]);

            labelEl.textContent   = notation.toUpperCase();
            numberEl.textContent  = result.total;
            breakdownEl.textContent = count > 1 ? `( ${result.rolls.join(' + ')} )` : '';

            overlay.classList.add('visible');
            clearTimeout(hideTimer);
            hideTimer = setTimeout(() => overlay.classList.remove('visible'), 4000);
        }

        function hideResult() {
            clearTimeout(hideTimer);
            overlay.classList.remove('visible');
        }

        try {
            const firebaseConfig = {
                apiKey: "AIzaSyA4wjtRUU5eTxBKMrYp615Ynqo2c5LSjsI",
                authDomain: "terracronus-dragonshard.firebaseapp.com",
                projectId: "terracronus-dragonshard",
                storageBucket: "terracronus-dragonshard.firebasestorage.app",
                messagingSenderId: "479723332460",
                appId: "1:479723332460:web:2ea5b21c67ddc70b018949",
                databaseURL: "https://terracronus-dragonshard-default-rtdb.europe-west1.firebasedatabase.app/"
            };

            const app = initializeApp(firebaseConfig);
            const db  = getDatabase(app);
            const rollsRef = ref(db, "shared_rolls");

            const diceContainer = document.getElementById('dice-box');
            diceContainer.style.width  = window.innerWidth  + 'px';
            diceContainer.style.height = window.innerHeight + 'px';

            const Box = new DiceBox({
                container:      "#dice-box",
                assetPath:      "/Dragonshard/assets/dice-box/assets/",
                theme:          "default",
                themeColor:     "#ffffff",
                labelColor:     "#000000",
                scale:          7,
                throwForce:     12,
                spinForce:      12,
                startingHeight: 15,
                width:  window.innerWidth,
                height: window.innerHeight,
            });

            await Box.init();
            Box.updateConfig({ width: window.innerWidth, height: window.innerHeight });

            statusEl.innerText = "Arena Ready";
            setReady(true);

            const startupTime = Date.now();

            onChildAdded(rollsRef, (snapshot) => {
                const data = snapshot.val();
                if (!data || data.timestamp < startupTime) return;

                if (data.clear) {
                    Box.clear();
                    hideResult();
                } else if (data.notation && data.seed) {
                    const age = Date.now() - data.timestamp;
                    if (age < 10000) {
                        // Trigger the 3D animation (visual only — may differ per device)
                        Box.roll(data.notation, { seed: data.seed });

                        // Show the authoritative result — same on every device, every time
                        showResult(data.notation, data.seed);
                    }
                }
            });

            const sendRoll = (notation) => {
                push(rollsRef, {
                    notation,
                    seed:      makeSeed(),
                    timestamp: Date.now()
                });
            };

            document.getElementById('btn-d20').addEventListener('click', () => sendRoll('1d20'));
            document.getElementById('btn-2d6').addEventListener('click', () => sendRoll('2d6'));
            document.getElementById('btn-clear').addEventListener('click', () => {
                push(rollsRef, { clear: true, timestamp: Date.now() });
            });

        } catch (error) {
            console.error("Critical Engine Failure:", error);
            statusEl.innerText = `Engine Failed: ${error.message}`;
            setReady(false);
        }
    </script>
</body>
</html>
