<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Dice Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0002;
            color: white;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-image: radial-gradient(circle at center, #1a0005 0%, #000000 100%);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,51,102,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,51,102,0.04) 1px, transparent 1px);
            background-size: 70px 70px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── ARENA ──────────────────────────────────────────── */
        #arena {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }

        /* ────────────────────────────────────────────────────────────────────
           TWO-LAYER DIE STRUCTURE
           .die-mover   → translates across the screen (top-left to bottom-right)
           .die-tumbler → spins freely in 3D, completely independent of position
           ──────────────────────────────────────────────────────────────────── */

        .die-mover {
            position: absolute;
            top: -120px;
            left: -120px;
            pointer-events: none;
            animation: fly-across var(--dur, 4.2s) cubic-bezier(0.22, 0.48, 0.56, 0.94)
                       var(--delay, 0s) both;
        }

        @keyframes fly-across {
            0%   { transform: translate(0px, 0px)       scale(0.35); opacity: 0; }
            5%   { opacity: 1; }
            15%  { transform: translate(15vw, 10vh)     scale(1.05); opacity: 1; }
            50%  { transform: translate(52vw, 48vh)     scale(1);    opacity: 1; }
            82%  { transform: translate(92vw, 88vh)     scale(0.95); opacity: 0.7; }
            100% { transform: translate(122vw, 122vh)   scale(0.8);  opacity: 0; }
        }

        /* True 3D tumble — all three axes, fully independent of the translation */
        .die-tumbler {
            animation: tumble-3d var(--dur, 4.2s) linear var(--delay, 0s) both;
        }

        @keyframes tumble-3d {
            0%   { transform: rotateX(0deg)              rotateY(0deg)              rotateZ(0deg); }
            100% { transform: rotateX(var(--rx, 480deg)) rotateY(var(--ry, 360deg)) rotateZ(var(--rz, 270deg)); }
        }

        /* ── D6 : CSS 3D CUBE ───────────────────────────────── */
        .d6-scene {
            width: 72px;
            height: 72px;
            perspective: 240px;
        }

        .d6-cube {
            width: 72px;
            height: 72px;
            position: relative;
            transform-style: preserve-3d;
        }

        .d6-face {
            position: absolute;
            width: 72px;
            height: 72px;
            border-radius: 10px;
            border: 1.5px solid rgba(0,0,0,0.2);
            backface-visibility: hidden;
        }

        .face-front  { background: linear-gradient(135deg, #f5f5f5, #d8d8d8);
                       transform: translateZ(36px);
                       box-shadow: inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 4px rgba(0,0,0,0.1); }
        .face-back   { background: linear-gradient(135deg, #c8c8c8, #aeaeae);
                       transform: rotateY(180deg) translateZ(36px); }
        .face-right  { background: linear-gradient(135deg, #d0d0d0, #b4b4b4);
                       transform: rotateY(90deg)  translateZ(36px); }
        .face-left   { background: linear-gradient(135deg, #cccccc, #b0b0b0);
                       transform: rotateY(-90deg) translateZ(36px); }
        .face-top    { background: linear-gradient(135deg, #e8e8e8, #c8c8c8);
                       transform: rotateX(90deg)  translateZ(36px); }
        .face-bottom { background: linear-gradient(135deg, #bebebe, #a8a8a8);
                       transform: rotateX(-90deg) translateZ(36px); }

        .d6-pips {
            display: grid;
            grid-template-areas:
                "tl . tr"
                "ml c mr"
                "bl . br";
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            width: 100%;
            height: 100%;
            padding: 10px;
        }

        .pip {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 35% 30%, #5a0018, #150003);
            border-radius: 50%;
            align-self: center;
            justify-self: center;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }

        /* ── D20 : CLEAN SUBDIVIDED TRIANGLE ───────────────── */
        .d20-scene {
            width: 88px;
            height: 88px;
            perspective: 280px;
        }

        .d20-shape {
            width: 88px;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .d20-shape svg {
            width: 88px;
            height: 88px;
            filter: drop-shadow(0 5px 16px rgba(0,0,0,0.8))
                    drop-shadow(0 0 24px rgba(255,51,102,0.35));
            overflow: visible;
        }

        /* ── UI CHROME ──────────────────────────────────────── */
        #result-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #result-display.visible { opacity: 1; }

        .res-label {
            font-size: 10px;
            letter-spacing: 5px;
            color: #ff3366;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .res-number {
            font-size: 88px;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 40px rgba(255,51,102,0.9), 0 0 90px rgba(255,51,102,0.4);
        }

        .res-number.pop {
            animation: pop-in 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes pop-in {
            0%   { transform: scale(0.3); opacity: 0; }
            70%  { transform: scale(1.12); }
            100% { transform: scale(1);   opacity: 1; }
        }

        .res-breakdown {
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255,204,204,0.7);
            margin-top: 8px;
            min-height: 1.4em;
        }

        .controls {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .button-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .roll-btn {
            background: rgba(40,0,10,0.65);
            border: 1px solid #ff3366;
            color: #ffcccc;
            padding: 12px 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.35s ease;
            font-size: 11px;
            font-family: 'Cinzel', serif;
            backdrop-filter: blur(4px);
        }

        .roll-btn:hover  { background: #ff3366; color: #fff; box-shadow: 0 0 22px rgba(255,51,102,0.7); }
        .roll-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        #status {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #ffcccc;
            font-size: 10px;
            letter-spacing: 3px;
            z-index: 100;
            pointer-events: none;
            text-transform: uppercase;
        }

        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #ff3366;
            text-decoration: none;
            font-size: 10px;
            border: 1px solid rgba(255,51,102,0.35);
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(10,0,2,0.65);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Cinzel', serif;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-nav">← Exit Arena</a>
    <div id="status">Connecting…</div>
    <div id="arena"></div>

    <div id="result-display">
        <div class="res-label"     id="res-label">—</div>
        <div class="res-number"    id="res-number">—</div>
        <div class="res-breakdown" id="res-breakdown"></div>
    </div>

    <div class="controls">
        <div class="button-group">
            <button id="btn-d20" class="roll-btn">Roll D20</button>
            <button id="btn-2d6" class="roll-btn">Roll 2D6</button>
            <button id="btn-clear" class="roll-btn">Clear</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded }
                                  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ─── SEEDED RNG (mulberry32) ──────────────────────────────────────────
        // Actual results come from pure maths — identical on every device.
        // The visual dice are purely cosmetic eye candy with no numbers on them.
        function mulberry32(a) {
            return () => {
                a |= 0; a = (a + 0x6D2B79F5) | 0;
                let t = Math.imul(a ^ (a >>> 15), 1 | a);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }
        function hashSeed(str) {
            let h = 5381;
            for (let i = 0; i < str.length; i++) h = (((h << 5) + h) + str.charCodeAt(i)) | 0;
            return h >>> 0;
        }
        function rollDice(sides, count, seed) {
            const rng = mulberry32(hashSeed(seed));
            return Array.from({ length: count }, () => Math.floor(rng() * sides) + 1);
        }

        // ─── D6 BUILDER ──────────────────────────────────────────────────────
        const PIP_MAP = {
            1: ['c'],
            2: ['tl','br'],
            3: ['tl','c','br'],
            4: ['tl','tr','bl','br'],
            5: ['tl','tr','c','bl','br'],
            6: ['tl','tr','ml','mr','bl','br'],
        };

        function makePipFace(faceClass, pipValue) {
            const face = document.createElement('div');
            face.className = `d6-face ${faceClass}`;
            if (pipValue != null) {
                const grid = document.createElement('div');
                grid.className = 'd6-pips';
                const lit = new Set(PIP_MAP[pipValue]);
                ['tl','tr','ml','c','mr','bl','br'].forEach(area => {
                    const cell = document.createElement('div');
                    cell.style.cssText = `grid-area:${area};display:flex;align-items:center;justify-content:center;`;
                    if (lit.has(area)) {
                        const pip = document.createElement('div');
                        pip.className = 'pip';
                        cell.appendChild(pip);
                    }
                    grid.appendChild(cell);
                });
                face.appendChild(grid);
            }
            return face;
        }

        function buildD6() {
            // Cosmetic pip values are random and completely independent of the real result
            const rnd = () => Math.floor(Math.random() * 6) + 1;

            const mover = document.createElement('div');
            mover.className = 'die-mover';
            const tumbler = document.createElement('div');
            tumbler.className = 'die-tumbler';
            const scene = document.createElement('div');
            scene.className = 'd6-scene';
            const cube = document.createElement('div');
            cube.className = 'd6-cube';

            // All six faces — three with pips, three plain shaded
            cube.appendChild(makePipFace('face-front',  rnd()));
            cube.appendChild(makePipFace('face-back',   rnd()));
            cube.appendChild(makePipFace('face-top',    rnd()));
            cube.appendChild(makePipFace('face-bottom', null));
            cube.appendChild(makePipFace('face-left',   null));
            cube.appendChild(makePipFace('face-right',  null));

            scene.appendChild(cube);
            tumbler.appendChild(scene);
            mover.appendChild(tumbler);
            return mover;
        }

        // ─── D20 BUILDER ─────────────────────────────────────────────────────
        // Classic D20 face: equilateral triangle subdivided into 4 smaller
        // triangles by connecting edge midpoints. No number — purely cosmetic.
        function buildD20() {
            const mover = document.createElement('div');
            mover.className = 'die-mover';
            const tumbler = document.createElement('div');
            tumbler.className = 'die-tumbler';
            const scene = document.createElement('div');
            scene.className = 'd20-scene';
            const shape = document.createElement('div');
            shape.className = 'd20-shape';

            // Outer triangle:  T(50,5)  BL(7,87)  BR(93,87)
            // Edge midpoints:  TL(28,46)  TR(72,46)  Bot(50,87)
            // Four inner faces, each subtly different shade:
            //   top-face    T, TL, TR
            //   left-face   BL, TL, Bot
            //   right-face  BR, TR, Bot
            //   center-face (inverted)  TL, TR, Bot
            shape.innerHTML = `
            <svg viewBox="0 0 100 94" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="gT" x1="50%" y1="0%" x2="50%" y2="100%">
                  <stop offset="0%" stop-color="#f2f2f2"/>
                  <stop offset="100%" stop-color="#d6d6d6"/>
                </linearGradient>
                <linearGradient id="gL" x1="0%" y1="50%" x2="100%" y2="50%">
                  <stop offset="0%" stop-color="#b8b8b8"/>
                  <stop offset="100%" stop-color="#d0d0d0"/>
                </linearGradient>
                <linearGradient id="gR" x1="100%" y1="50%" x2="0%" y2="50%">
                  <stop offset="0%" stop-color="#b0b0b0"/>
                  <stop offset="100%" stop-color="#c8c8c8"/>
                </linearGradient>
                <linearGradient id="gC" x1="50%" y1="0%" x2="50%" y2="100%">
                  <stop offset="0%" stop-color="#d4d4d4"/>
                  <stop offset="100%" stop-color="#bcbcbc"/>
                </linearGradient>
              </defs>
              <polygon points="50,5  28,46 72,46" fill="url(#gT)" stroke="#929292" stroke-width="1.2" stroke-linejoin="round"/>
              <polygon points="7,87  28,46 50,87" fill="url(#gL)" stroke="#929292" stroke-width="1.2" stroke-linejoin="round"/>
              <polygon points="93,87 72,46 50,87" fill="url(#gR)" stroke="#929292" stroke-width="1.2" stroke-linejoin="round"/>
              <polygon points="28,46 72,46 50,87" fill="url(#gC)" stroke="#aaaaaa" stroke-width="1.2" stroke-linejoin="round"/>
              <polygon points="50,5 7,87 93,87"   fill="none"     stroke="#888888" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>`;

            scene.appendChild(shape);
            tumbler.appendChild(scene);
            mover.appendChild(tumbler);
            return mover;
        }

        // ─── LAUNCH ──────────────────────────────────────────────────────────
        let clearTimer = null;

        function launchDice(type, values) {
            const arena = document.getElementById('arena');

            values.forEach((_, i) => {
                const el = type === 'd20' ? buildD20() : buildD6();

                const spread = (i - (values.length - 1) / 2) * 70;
                el.style.top  = `${-120 + spread}px`;
                el.style.left = `${-120 - i * 22}px`;

                const dur = 4.4 + i * 0.2;
                el.style.setProperty('--delay', `${i * 0.25}s`);
                el.style.setProperty('--dur',   `${dur}s`);

                // Each die gets a unique random 3D rotation — unrelated to the result
                el.style.setProperty('--rx', `${400 + Math.random() * 280}deg`);
                el.style.setProperty('--ry', `${280 + Math.random() * 320}deg`);
                el.style.setProperty('--rz', `${160 + Math.random() * 280}deg`);

                arena.appendChild(el);

                // Two animations fire on two child elements (mover + tumbler).
                // Wait for both to finish before removing.
                let endCount = 0;
                const onEnd = () => { if (++endCount >= 2) el.remove(); };
                el.addEventListener('animationend', onEnd);
                el.firstChild.addEventListener('animationend', onEnd);
            });

            // ── result overlay ──
            const total     = values.reduce((a, b) => a + b, 0);
            const label     = type === 'd20' ? 'D20' : '2D6';
            const breakdown = values.length > 1
                ? values.join(' + ') + `  =  ${total}`
                : '';

            const display = document.getElementById('result-display');
            const numEl   = document.getElementById('res-number');

            document.getElementById('res-label').textContent     = label;
            document.getElementById('res-breakdown').textContent = breakdown;

            numEl.classList.remove('pop');
            numEl.textContent = total;
            void numEl.offsetWidth;
            numEl.classList.add('pop');

            display.classList.add('visible');
            if (clearTimer) clearTimeout(clearTimer);
            clearTimer = setTimeout(() => display.classList.remove('visible'), 5000);
        }

        function clearArena() {
            document.getElementById('arena').innerHTML = '';
            document.getElementById('result-display').classList.remove('visible');
            if (clearTimer) clearTimeout(clearTimer);
        }

        // ─── FIREBASE ────────────────────────────────────────────────────────
        const statusEl = document.getElementById('status');
        const buttons  = document.querySelectorAll('.roll-btn');
        const setReady = r => buttons.forEach(b => b.disabled = !r);
        setReady(false);

        try {
            const firebaseConfig = {
                apiKey:            "AIzaSyA4wjtRUU5eTxBKMrYp615Ynqo2c5LSjsI",
                authDomain:        "terracronus-dragonshard.firebaseapp.com",
                projectId:         "terracronus-dragonshard",
                storageBucket:     "terracronus-dragonshard.firebasestorage.app",
                messagingSenderId: "479723332460",
                appId:             "1:479723332460:web:2ea5b21c67ddc70b018949",
                databaseURL:       "https://terracronus-dragonshard-default-rtdb.europe-west1.firebasedatabase.app/"
            };

            const app      = initializeApp(firebaseConfig);
            const db       = getDatabase(app);
            const rollsRef = ref(db, "shared_rolls");

            statusEl.innerText = "Arena Ready";
            setReady(true);

            const startupTime = Date.now();

            onChildAdded(rollsRef, snapshot => {
                const data = snapshot.val();
                if (!data || data.timestamp < startupTime) return;

                if (data.clear) {
                    clearArena();
                } else if (data.type && data.seed) {
                    if (Date.now() - data.timestamp < 10000) {
                        const [sides, count] = data.type === 'd20' ? [20, 1] : [6, 2];
                        const values = rollDice(sides, count, data.seed);
                        launchDice(data.type, values);
                    }
                }
            });

            const makeSeed = () => Math.random().toString(36).substring(2, 10);
            const sendRoll = type => push(rollsRef, { type, seed: makeSeed(), timestamp: Date.now() });

            document.getElementById('btn-d20').addEventListener('click',  () => sendRoll('d20'));
            document.getElementById('btn-2d6').addEventListener('click',  () => sendRoll('2d6'));
            document.getElementById('btn-clear').addEventListener('click', () =>
                push(rollsRef, { clear: true, timestamp: Date.now() })
            );

        } catch (err) {
            console.error("Critical Engine Failure:", err);
            statusEl.innerText = `Engine Failed: ${err.message}`;
            setReady(false);
        }
    </script>
</body>
</html>
