<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Dice Arena</title>
    <style>
        body { margin: 0; background: #0a0002; color: white; font-family: 'serif'; overflow: hidden; height: 100vh; width: 100vw; background-image: radial-gradient(circle, #1a0005 0%, #000000 100%); }
        #dice-box { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .controls { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .roll-btn { background: rgba(40, 0, 10, 0.6); border: 1px solid #ff3366; color: #ffcccc; padding: 12px 25px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 4px; transition: all 0.4s ease; font-size: 12px; }
        .roll-btn:hover { background: #ff3366; color: white; box-shadow: 0 0 20px #ff3366; }
        #status { position: absolute; top: 20px; right: 20px; color: #ffcccc; font-size: 12px; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <a href="index.html" style="position: absolute; top: 20px; left: 20px; z-index: 100; color: #ff3366; text-decoration: none; font-size: 11px; border: 1px solid rgba(255, 51, 102, 0.3); padding: 8px 15px; border-radius: 20px; background: rgba(10, 0, 2, 0.6);">← Exit Arena</a>
    
    <div id="status">Loading Engine...</div>
    <div id="dice-box"></div>
    
    <div class="controls">
        <div class="button-group">
            <button id="btn-d20" class="roll-btn">Roll D20</button>
            <button id="btn-2d6" class="roll-btn">Roll 2D6</button>
            <button id="btn-clear" class="roll-btn">Clear</button>
        </div>
    </div>

    <script type="module">
        // Import Firebase directly
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // Import DiceBox directly from JSDelivr (fixes the "Failed to fetch" CORS error)
        import DiceBox from "https://cdn.jsdelivr.net/npm/@3d-dice/dice-box@1.1.3/dist/dice-box.es.min.js";

        // Hardcode the config here to guarantee it loads
        const firebaseConfig = {
            apiKey: "AIzaSyA4wjtRUU5eTxBKMrYp615Ynqo2c5LSjsI",
            authDomain: "terracronus-dragonshard.firebaseapp.com",
            projectId: "terracronus-dragonshard",
            storageBucket: "terracronus-dragonshard.firebasestorage.app",
            messagingSenderId: "479723332460",
            appId: "1:479723332460:web:2ea5b21c67ddc70b018949",
            databaseURL: "https://terracronus-dragonshard-default-rtdb.firebaseio.com" 
        };

        const statusEl = document.getElementById('status');

        try {
            // 1. Start Firebase
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const rollsRef = ref(db, "shared_rolls");

            // 2. Start DiceBox
            const Box = new DiceBox({
                container: "#dice-box",
                assetPath: "https://cdn.jsdelivr.net/npm/@3d-dice/dice-box@1.1.3/dist/assets/",
                theme: "default",
                scale: 6
            });

            await Box.init();
            statusEl.innerText = "Arena Ready";

            // 3. Listen for incoming rolls
            onChildAdded(rollsRef, (snapshot) => {
                const data = snapshot.val();
                const now = Date.now();
                // Only roll if it happened in the last 10 seconds
                if (data.timestamp && (now - data.timestamp) < 10000) {
                    Box.roll(data.notation);
                }
            });

            // 4. Bind Buttons directly (Guaranteed to work, bypasses window scope)
            document.getElementById('btn-d20').addEventListener('click', () => {
                push(rollsRef, { notation: '1d20', timestamp: serverTimestamp() });
            });

            document.getElementById('btn-2d6').addEventListener('click', () => {
                push(rollsRef, { notation: '2d6', timestamp: serverTimestamp() });
            });

            document.getElementById('btn-clear').addEventListener('click', () => {
                Box.clear();
            });

        } catch (error) {
            console.error(error);
            statusEl.innerText = "Connection Failed";
        }
    </script>
</body>
</html>
