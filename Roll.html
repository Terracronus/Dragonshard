<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Dice Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0002;
            color: white;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-image: radial-gradient(circle at center, #1a0005 0%, #000000 100%);
        }

        /* Subtle grid atmosphere */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,51,102,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,51,102,0.04) 1px, transparent 1px);
            background-size: 70px 70px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── DICE ANIMATION ──────────────────────────────── */
        #arena {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }

        .die {
            position: absolute;
            pointer-events: none;
            will-change: transform, top, left, opacity;
        }

        /* ── D6 : CSS 3D cube, 3 visible faces ─────────────── */
        .die-d6-wrap {
            width: 80px;
            height: 80px;
            perspective: 260px;
            perspective-origin: 60% 30%;
        }

        .die-d6 {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-22deg) rotateY(30deg);
        }

        .d6-face {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 11px;
            border: 1.5px solid rgba(0,0,0,0.18);
            backface-visibility: hidden;
        }

        /* Front */
        .d6-face-front {
            background: linear-gradient(140deg, #f9f9f9 0%, #d6d6d6 100%);
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.85), inset -2px -2px 5px rgba(0,0,0,0.12);
            transform: translateZ(40px);
        }

        /* Top */
        .d6-face-top {
            background: linear-gradient(160deg, #e4e4e4 0%, #c4c4c4 100%);
            transform: rotateX(90deg) translateZ(40px);
        }

        /* Right */
        .d6-face-right {
            background: linear-gradient(160deg, #cbcbcb 0%, #a8a8a8 100%);
            transform: rotateY(90deg) translateZ(40px);
        }

        .d6-pips {
            display: grid;
            grid-template-areas:
                "tl . tr"
                "ml c mr"
                "bl . br";
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            width: 100%;
            height: 100%;
            padding: 11px;
        }

        .pip {
            width: 13px;
            height: 13px;
            background: radial-gradient(circle at 35% 35%, #5a0018, #1a0005);
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.5), 0 1px 2px rgba(255,255,255,0.08);
            align-self: center;
            justify-self: center;
        }

        /* ── D20 : multi-face SVG ────────────────────────── */
        .die-d20 {
            width: 96px;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            filter: drop-shadow(0 5px 14px rgba(0,0,0,0.75)) drop-shadow(0 0 28px rgba(255,51,102,0.4));
        }

        .die-d20 svg { width: 96px; height: 96px; overflow: visible; }

        /* ── FLIGHT ANIMATION ────────────────────────────── */
        /*  Die travels top-left → bottom-right with a slight outward arc.
            Keyframes use translate+rotate so the 3D perspective stays correct. */
        @keyframes tumble-across {
            0%   {
                transform: translate(-5px,-5px)  rotate(0deg)   scale(0.3);
                opacity: 0;
            }
            4%   { opacity: 1; }
            12%  {
                transform: translate(12vw, 8vh)  rotate(85deg)  scale(1.05);
            }
            45%  {
                transform: translate(48vw, 44vh) rotate(260deg) scale(1);
                opacity: 1;
            }
            80%  {
                transform: translate(88vw, 85vh) rotate(480deg) scale(0.92);
                opacity: 0.6;
            }
            100% {
                transform: translate(118vw, 118vh) rotate(var(--spin, 620deg)) scale(0.7);
                opacity: 0;
            }
        }

        .die {
            top: -100px;
            left: -100px;
            animation: tumble-across var(--dur, 4.2s) cubic-bezier(0.18, 0.55, 0.58, 0.98)
                       var(--delay, 0s) both;
        }

        /* ── RESULT DISPLAY ──────────────────────────────── */
        #result-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #result-display.visible { opacity: 1; }

        .res-label {
            font-size: 10px;
            letter-spacing: 5px;
            color: #ff3366;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .res-number {
            font-size: 88px;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 40px rgba(255,51,102,0.9), 0 0 90px rgba(255,51,102,0.4);
        }

        .res-number.pop {
            animation: pop-in 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes pop-in {
            0%   { transform: scale(0.3); opacity: 0; }
            70%  { transform: scale(1.12); }
            100% { transform: scale(1);   opacity: 1; }
        }

        .res-breakdown {
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255,204,204,0.7);
            margin-top: 8px;
            min-height: 1.4em;
        }

        /* ── UI CHROME ──────────────────────────────────── */
        .controls {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .button-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .roll-btn {
            background: rgba(40,0,10,0.65);
            border: 1px solid #ff3366;
            color: #ffcccc;
            padding: 12px 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.35s ease;
            font-size: 11px;
            font-family: 'Cinzel', serif;
            backdrop-filter: blur(4px);
        }

        .roll-btn:hover { background: #ff3366; color: #fff; box-shadow: 0 0 22px rgba(255,51,102,0.7); }
        .roll-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        #status {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #ffcccc;
            font-size: 10px;
            letter-spacing: 3px;
            z-index: 100;
            pointer-events: none;
            text-transform: uppercase;
        }

        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #ff3366;
            text-decoration: none;
            font-size: 10px;
            border: 1px solid rgba(255,51,102,0.35);
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(10,0,2,0.65);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Cinzel', serif;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-nav">← Exit Arena</a>
    <div id="status">Connecting…</div>
    <div id="arena"></div>

    <div id="result-display">
        <div class="res-label"  id="res-label">—</div>
        <div class="res-number" id="res-number">—</div>
        <div class="res-breakdown" id="res-breakdown"></div>
    </div>

    <div class="controls">
        <div class="button-group">
            <button id="btn-d20" class="roll-btn">Roll D20</button>
            <button id="btn-2d6" class="roll-btn">Roll 2D6</button>
            <button id="btn-clear" class="roll-btn">Clear</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded }
                                  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ─────────────────────────────────────────────────────────────────────
        // SEEDED RNG  –  mulberry32
        //   • Pure maths, zero physics, identical result on every device
        //   • The seed is shared via Firebase so everyone sees the same number
        // ─────────────────────────────────────────────────────────────────────
        function mulberry32(a) {
            return () => {
                a |= 0;
                a  = (a + 0x6D2B79F5) | 0;
                let t = Math.imul(a ^ (a >>> 15), 1 | a);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function hashSeed(str) {
            let h = 5381;
            for (let i = 0; i < str.length; i++)
                h = (((h << 5) + h) + str.charCodeAt(i)) | 0;
            return h >>> 0;
        }

        function rollDice(sides, count, seed) {
            const rng = mulberry32(hashSeed(seed));
            return Array.from({ length: count }, () => Math.floor(rng() * sides) + 1);
        }

        // ─────────────────────────────────────────────────────────────────────
        // DICE BUILDERS
        // ─────────────────────────────────────────────────────────────────────
        const PIP_MAP = {
            1: ['c'],
            2: ['tl','br'],
            3: ['tl','c','br'],
            4: ['tl','tr','bl','br'],
            5: ['tl','tr','c','bl','br'],
            6: ['tl','tr','ml','mr','bl','br'],
        };

        function buildD6(value) {
            // Outer .die wrapper (handles flight anim)
            const die = document.createElement('div');
            die.className = 'die';

            // 3D perspective wrapper
            const wrap = document.createElement('div');
            wrap.className = 'die-d6-wrap';

            const cube = document.createElement('div');
            cube.className = 'die-d6';

            // Front face — shows the pip value
            const front = document.createElement('div');
            front.className = 'd6-face d6-face-front';
            const grid = document.createElement('div');
            grid.className = 'd6-pips';
            const lit = new Set(PIP_MAP[value] ?? []);
            ['tl','tr','ml','c','mr','bl','br'].forEach(area => {
                const cell = document.createElement('div');
                cell.style.cssText = `grid-area:${area};display:flex;align-items:center;justify-content:center;`;
                if (lit.has(area)) {
                    const pip = document.createElement('div');
                    pip.className = 'pip';
                    cell.appendChild(pip);
                }
                grid.appendChild(cell);
            });
            front.appendChild(grid);

            // Top face (just shaded, no pips needed)
            const top = document.createElement('div');
            top.className = 'd6-face d6-face-top';

            // Right face
            const right = document.createElement('div');
            right.className = 'd6-face d6-face-right';

            cube.appendChild(front);
            cube.appendChild(top);
            cube.appendChild(right);
            wrap.appendChild(cube);
            die.appendChild(wrap);
            return die;
        }

        function buildD20(value) {
            // Outer .die wrapper (handles flight anim)
            const die = document.createElement('div');
            die.className = 'die';

            const wrap = document.createElement('div');
            wrap.className = 'die-d20';

            // Multi-face SVG — front face (bright) + 3 adjacent (shaded) + 3 outer (dark)
            // ViewBox 0 0 100 100
            // Front (up-pointing triangle): A(50,16) B(14,79) C(86,79)  centroid≈(50,58)
            // Left adj: A,B, D(2,47)
            // Right adj: A,C, E(98,47)
            // Bottom adj: B,C, F(50,99)
            // Top-left outer: A,D, G(28,4)
            // Top-right outer: A,E, H(72,4)
            // Bottom-left outer: B,D, I(2,84)   Bottom-right outer: C,E, J(98,84)
            wrap.innerHTML = `
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="gFront_${value}" x1="30%" y1="0%" x2="70%" y2="100%">
                  <stop offset="0%" stop-color="#f4f4f4"/>
                  <stop offset="100%" stop-color="#d0d0d0"/>
                </linearGradient>
              </defs>
              <!-- outermost / darkest faces first -->
              <polygon points="50,16 2,47 28,4"   fill="#787878" stroke="#555" stroke-width="0.8" stroke-linejoin="round"/>
              <polygon points="50,16 98,47 72,4"  fill="#848484" stroke="#555" stroke-width="0.8" stroke-linejoin="round"/>
              <polygon points="14,79 2,47 2,84"   fill="#6e6e6e" stroke="#555" stroke-width="0.8" stroke-linejoin="round"/>
              <polygon points="86,79 98,47 98,84" fill="#787878" stroke="#555" stroke-width="0.8" stroke-linejoin="round"/>
              <polygon points="14,79 86,79 50,99" fill="#888888" stroke="#555" stroke-width="0.8" stroke-linejoin="round"/>
              <!-- adjacent faces (medium) -->
              <polygon points="50,16 14,79 2,47"  fill="#a8a8a8" stroke="#777" stroke-width="0.9" stroke-linejoin="round"/>
              <polygon points="50,16 86,79 98,47" fill="#b8b8b8" stroke="#777" stroke-width="0.9" stroke-linejoin="round"/>
              <polygon points="14,79 86,79 50,99" fill="#a0a0a0" stroke="#777" stroke-width="0.9" stroke-linejoin="round"/>
              <!-- front face — brightest -->
              <polygon points="50,16 14,79 86,79" fill="url(#gFront_${value})" stroke="#999" stroke-width="1.2" stroke-linejoin="round"/>
              <!-- inner guide line — subtle inner triangle for the "d20 look" -->
              <polygon points="50,28 24,74 76,74" fill="none" stroke="rgba(26,0,5,0.10)" stroke-width="1"/>
              <!-- value, centred on front face centroid (50, 58) -->
              <text x="50" y="65"
                    text-anchor="middle"
                    font-family="Cinzel, Georgia, serif"
                    font-weight="700"
                    font-size="${value >= 10 ? 19 : 22}"
                    fill="#1a0005"
                    letter-spacing="0">${value}</text>
            </svg>`;

            die.appendChild(wrap);
            return die;
        }

        // ─────────────────────────────────────────────────────────────────────
        // LAUNCH ANIMATION  –  all dice fly top-left → bottom-right
        // ─────────────────────────────────────────────────────────────────────
        let clearTimer = null;

        function launchDice(type, values) {
            const arena = document.getElementById('arena');

            values.forEach((val, i) => {
                const el = type === 'd20' ? buildD20(val) : buildD6(val);

                // Stagger multi-dice slightly so they don't stack perfectly
                const lateralShift = (i - (values.length - 1) / 2) * 60;
                el.style.top  = `${-110 + lateralShift}px`;
                el.style.left = `${-110 - i * 18}px`;
                el.style.setProperty('--delay', `${i * 0.22}s`);
                el.style.setProperty('--dur',   `${4.2 + i * 0.15}s`);
                el.style.setProperty('--spin',  `${560 + i * 110}deg`);

                arena.appendChild(el);
                el.addEventListener('animationend', () => el.remove(), { once: true });
            });

            // ── result overlay ──
            const total     = values.reduce((a, b) => a + b, 0);
            const labelText = type === 'd20' ? 'D20' : '2D6';
            const breakdown = values.length > 1
                ? values.join(' + ') + `  =  ${total}`
                : '';

            const display   = document.getElementById('result-display');
            const numEl     = document.getElementById('res-number');

            document.getElementById('res-label').textContent     = labelText;
            document.getElementById('res-breakdown').textContent = breakdown;

            // Re-trigger pop animation
            numEl.classList.remove('pop');
            numEl.textContent = total;
            void numEl.offsetWidth; // force reflow
            numEl.classList.add('pop');

            display.classList.add('visible');

            if (clearTimer) clearTimeout(clearTimer);
            clearTimer = setTimeout(() => display.classList.remove('visible'), 4500);
        }

        function clearArena() {
            document.getElementById('arena').innerHTML = '';
            document.getElementById('result-display').classList.remove('visible');
            if (clearTimer) clearTimeout(clearTimer);
        }

        // ─────────────────────────────────────────────────────────────────────
        // FIREBASE
        // ─────────────────────────────────────────────────────────────────────
        const statusEl = document.getElementById('status');
        const buttons  = document.querySelectorAll('.roll-btn');
        const setReady = (r) => buttons.forEach(b => b.disabled = !r);
        setReady(false);

        try {
            const firebaseConfig = {
                apiKey:            "AIzaSyA4wjtRUU5eTxBKMrYp615Ynqo2c5LSjsI",
                authDomain:        "terracronus-dragonshard.firebaseapp.com",
                projectId:         "terracronus-dragonshard",
                storageBucket:     "terracronus-dragonshard.firebasestorage.app",
                messagingSenderId: "479723332460",
                appId:             "1:479723332460:web:2ea5b21c67ddc70b018949",
                databaseURL:       "https://terracronus-dragonshard-default-rtdb.europe-west1.firebasedatabase.app/"
            };

            const app      = initializeApp(firebaseConfig);
            const db       = getDatabase(app);
            const rollsRef = ref(db, "shared_rolls");

            statusEl.innerText = "Arena Ready";
            setReady(true);

            const startupTime = Date.now();

            onChildAdded(rollsRef, (snapshot) => {
                const data = snapshot.val();
                if (!data || data.timestamp < startupTime) return;

                if (data.clear) {
                    clearArena();
                } else if (data.type && data.seed) {
                    if (Date.now() - data.timestamp < 10000) {
                        const [sides, count] = data.type === 'd20' ? [20, 1] : [6, 2];
                        const values = rollDice(sides, count, data.seed);
                        launchDice(data.type, values);
                    }
                }
            });

            const makeSeed = () => Math.random().toString(36).substring(2, 10);
            const sendRoll = (type) => push(rollsRef, { type, seed: makeSeed(), timestamp: Date.now() });

            document.getElementById('btn-d20').addEventListener('click',  () => sendRoll('d20'));
            document.getElementById('btn-2d6').addEventListener('click',  () => sendRoll('2d6'));
            document.getElementById('btn-clear').addEventListener('click', () =>
                push(rollsRef, { clear: true, timestamp: Date.now() })
            );

        } catch (err) {
            console.error("Critical Engine Failure:", err);
            statusEl.innerText = `Engine Failed: ${err.message}`;
            setReady(false);
        }
    </script>
</body>
</html>
