<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Arena – Paige</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --ac:       #f59e0b;
            --ac-rgb:   245,158,11;
            --text:     rgba(255,242,205,0.85);
            --text-dim: rgba(245,185,100,0.7);
        }
        body {
            margin: 0; background: #181818; color: white; font-family: 'serif';
            overflow: hidden; height: 100vh; width: 100vw;
            background-image: radial-gradient(circle, #262626 0%, #111111 100%);
        }
        #dice-box { position: absolute; top: 0; left: 0; z-index: 1; }
        #dice-box canvas {
            position: absolute !important; top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }
        #engine-status {
            position: absolute; top: 16px; right: 16px;
            color: var(--text-dim); font-size: 11px; z-index: 100;
            pointer-events: none; letter-spacing: 1px;
        }
        .back-nav {
            position: absolute; top: 14px; left: 14px; z-index: 100;
            color: var(--ac); text-decoration: none; font-size: 11px;
            border: 1px solid rgba(var(--ac-rgb), 0.35); padding: 7px 14px;
            border-radius: 20px; background: rgba(10,10,10,0.7);
            text-transform: uppercase; letter-spacing: 2px;
        }
        /* Live roll log */
        #roll-log {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; flex-direction: column;
            align-items: center; gap: 6px; pointer-events: none;
            width: calc(100% - 32px); max-width: 420px;
        }
        .roll-note {
            width: 100%; background: rgba(15,15,15,0.92);
            padding: 9px 16px; border-radius: 6px;
            font-size: 13px; letter-spacing: 0.5px; text-align: center;
            animation: slideIn 0.2s ease;
        }
        .roll-note.rolling  { border: 1px solid #ff9933; color: #ffcc99; }
        .roll-note.complete { border: 1px solid #44ffaa; color: #aaffdd; }
        .roll-note.mine     { border-color: var(--ac); color: var(--text); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        /* Bottom panel */
        #bottom-panel {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
            padding: 0 12px 28px; display: flex; flex-direction: column; gap: 10px;
        }
        #bottom-panel::before {
            content: ''; position: absolute;
            top: -32px; left: 0; right: 0; height: 32px;
            background: linear-gradient(to bottom, transparent, rgba(15,15,15,0.6));
            pointer-events: none;
        }
        #history-wrap details {
            background: rgba(15,15,15,0.9);
            border: 1px solid rgba(var(--ac-rgb), 0.3);
            border-radius: 8px; overflow: hidden;
        }
        #history-wrap summary {
            padding: 8px 14px; font-size: 11px; letter-spacing: 2px;
            text-transform: uppercase; color: var(--ac);
            cursor: pointer; user-select: none; list-style: none;
            display: flex; align-items: center; gap: 8px;
        }
        #history-wrap summary::-webkit-details-marker { display: none; }
        #history-wrap summary::before {
            content: '▶'; font-size: 8px; transition: transform 0.2s;
            color: rgba(var(--ac-rgb), 0.5);
        }
        #history-wrap details[open] summary::before { transform: rotate(90deg); }
        #history-list {
            padding: 0 10px 10px; display: flex; flex-direction: column;
            gap: 4px; max-height: 180px; overflow-y: auto;
        }
        #history-list::-webkit-scrollbar { width: 3px; }
        #history-list::-webkit-scrollbar-thumb { background: rgba(var(--ac-rgb), 0.3); border-radius: 2px; }
        .hist-entry {
            font-size: 11px; color: var(--text); padding: 5px 8px;
            border-left: 2px solid rgba(var(--ac-rgb), 0.25);
            letter-spacing: 0.3px; line-height: 1.6;
        }
        .hist-who  { color: var(--text-dim); font-size: 10px; }
        .hist-roll { color: #ffffff; }
        .hist-time { color: rgba(var(--ac-rgb), 0.4); font-size: 10px; margin-left: 4px; }
        .empty-note { color: rgba(var(--ac-rgb), 0.3); font-size: 11px; padding: 4px 8px; display: block; font-style: italic; }
        /* Open Roll button */
        #btn-open-roll {
            width: 100%; padding: 16px;
            background: rgba(20,20,20,0.85);
            border: 1px solid var(--ac); color: var(--text);
            text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer; border-radius: 5px; font-size: 15px; font-family: serif;
            transition: background 0.25s, box-shadow 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        #btn-open-roll:not(:disabled):active {
            background: var(--ac); color: white;
            box-shadow: 0 0 20px rgba(var(--ac-rgb), 0.8);
        }
        #btn-open-roll:disabled { opacity: 0.35; cursor: not-allowed; }
        /* Roll selector overlay */
        #roll-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 150;
            background: rgba(6,6,16,0.98);
            border-top: 1px solid rgba(var(--ac-rgb), 0.4);
            border-radius: 18px 18px 0 0;
            padding: 8px 16px 44px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #roll-overlay.open { transform: translateY(0); }
        .overlay-handle {
            width: 36px; height: 4px;
            background: rgba(var(--ac-rgb), 0.25);
            border-radius: 2px; margin: 0 auto 18px;
        }
        .overlay-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .overlay-title {
            font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
            color: var(--text-dim);
        }
        #btn-close-overlay {
            background: none; border: none; color: var(--text-dim);
            font-size: 18px; cursor: pointer; padding: 4px 8px; line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }
        /* Dice type grid */
        .dice-type-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            margin-bottom: 18px;
        }
        .dice-type-btn {
            background: rgba(20,20,20,0.85);
            border: 1px solid rgba(var(--ac-rgb), 0.3);
            color: rgba(var(--ac-rgb), 0.65);
            padding: 13px 4px; text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; border-radius: 5px;
            transition: all 0.15s;
            font-size: 13px; font-family: serif;
            -webkit-tap-highlight-color: transparent;
        }
        .dice-type-btn.d100-btn { grid-column: span 2; }
        .dice-type-btn.selected {
            background: rgba(var(--ac-rgb), 0.18);
            border-color: var(--ac);
            color: var(--text);
            box-shadow: 0 0 10px rgba(var(--ac-rgb), 0.25);
        }
        /* Count selector */
        .count-section { margin-bottom: 14px; }
        .count-label {
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
            color: var(--text-dim); text-align: center; margin: 0 0 10px;
        }
        .count-row {
            display: flex; align-items: center; justify-content: center; gap: 24px;
        }
        .count-btn {
            background: rgba(var(--ac-rgb), 0.1);
            border: 1px solid rgba(var(--ac-rgb), 0.4);
            color: var(--ac); width: 42px; height: 42px; border-radius: 50%;
            font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; line-height: 1; padding-bottom: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        .count-btn:not(:disabled):active { background: rgba(var(--ac-rgb), 0.3); }
        .count-btn:disabled { opacity: 0.25; cursor: not-allowed; }
        #dice-count-display {
            font-size: 34px; min-width: 52px; text-align: center;
            color: var(--text); font-family: serif; line-height: 1;
        }
        /* Rate limit info */
        #rate-info {
            font-size: 10px; letter-spacing: 1.5px; text-align: center;
            text-transform: uppercase; color: var(--text-dim);
            margin-bottom: 14px; min-height: 14px;
        }
        #rate-info.over-limit { color: #ff5555; }
        /* Confirm roll button */
        #btn-confirm-roll {
            width: 100%; padding: 16px;
            background: rgba(var(--ac-rgb), 0.12);
            border: 1px solid var(--ac); color: var(--text);
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; border-radius: 5px; font-size: 14px; font-family: serif;
            transition: all 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        #btn-confirm-roll:not(:disabled):active {
            background: var(--ac); color: #0a0a0a;
            box-shadow: 0 0 20px rgba(var(--ac-rgb), 0.8);
        }
        #btn-confirm-roll:disabled { opacity: 0.35; cursor: not-allowed; }
    </style>
</head>
<body>
    <a href="Hub.html" class="back-nav">← Back to Hub</a>
    <div id="engine-status">Loading Engine...</div>
    <div id="dice-box"></div>
    <div id="roll-log"></div>

    <div id="bottom-panel">
        <div id="history-wrap">
            <details>
                <summary>Roll History</summary>
                <div id="history-list">
                    <em class="empty-note">No rolls yet</em>
                </div>
            </details>
        </div>
        <button id="btn-open-roll" disabled>Roll…</button>
    </div>

    <!-- Slide-up dice selector -->
    <div id="roll-overlay">
        <div class="overlay-handle"></div>
        <div class="overlay-header">
            <span class="overlay-title">Choose Your Dice</span>
            <button id="btn-close-overlay">✕</button>
        </div>
        <div class="dice-type-grid">
            <button class="dice-type-btn" data-face="d4"   data-label="D4">D4</button>
            <button class="dice-type-btn" data-face="d6"   data-label="D6">D6</button>
            <button class="dice-type-btn" data-face="d8"   data-label="D8">D8</button>
            <button class="dice-type-btn" data-face="d10"  data-label="D10">D10</button>
            <button class="dice-type-btn" data-face="d12"  data-label="D12">D12</button>
            <button class="dice-type-btn" data-face="d20"  data-label="D20">D20</button>
            <button class="dice-type-btn d100-btn" data-face="d100" data-label="D100" data-percentile="true">D100</button>
        </div>
        <div class="count-section">
            <p class="count-label">Number of Dice</p>
            <div class="count-row">
                <button class="count-btn" id="btn-count-down" disabled>−</button>
                <span id="dice-count-display">1</span>
                <button class="count-btn" id="btn-count-up"   disabled>+</button>
            </div>
        </div>
        <div id="rate-info"></div>
        <button id="btn-confirm-roll" disabled>Select a die type</button>
    </div>

    <script type="module">
        import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, push, remove, onValue }
                                                          from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import DiceBox                                    from "https://terracronus.github.io/Dragonshard/assets/dice-box/dice-box.es.min.js";

        const PLAYER_NAME = "Paige";
        const DICE_COLOR  = "#d97706";
        const IS_DM       = false;   // DM is exempt from rate limiting
        const MAX_HISTORY = 10;
        const RATE_LIMIT  = 10;          // max physical dice per 60 seconds

        const firebaseConfig = {
            apiKey:            "AIzaSyA4wjtRUU5eTxBKMrYp615Ynqo2c5LSjsI",
            authDomain:        "terracronus-dragonshard.firebaseapp.com",
            projectId:         "terracronus-dragonshard",
            storageBucket:     "terracronus-dragonshard.firebasestorage.app",
            messagingSenderId: "479723332460",
            appId:             "1:479723332460:web:2ea5b21c67ddc70b018949",
            databaseURL:       "https://terracronus-dragonshard-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app     = initializeApp(firebaseConfig);
        const db      = getDatabase(app);
        const myRef   = ref(db, `roll_status/${PLAYER_NAME}`);
        const allRef  = ref(db, "roll_status");
        const histRef = ref(db, "roll_history");

        // --- DOM refs ---
        const engineStatus    = document.getElementById('engine-status');
        const logEl           = document.getElementById('roll-log');
        const histListEl      = document.getElementById('history-list');
        const bottomPanel     = document.getElementById('bottom-panel');
        const diceContainer   = document.getElementById('dice-box');
        const openRollBtn     = document.getElementById('btn-open-roll');
        const overlay         = document.getElementById('roll-overlay');
        const closeOverlayBtn = document.getElementById('btn-close-overlay');
        const diceTypeBtns    = document.querySelectorAll('.dice-type-btn');
        const countDownBtn    = document.getElementById('btn-count-down');
        const countUpBtn      = document.getElementById('btn-count-up');
        const countDisplay    = document.getElementById('dice-count-display');
        const rateInfo        = document.getElementById('rate-info');
        const confirmBtn      = document.getElementById('btn-confirm-roll');

        // --- Rate limiting (ignored when IS_DM) ---
        // Tracks {ts, n} of each roll within the last 60 s
        let diceLog = [];
        function getDiceUsed() {
            const now = Date.now();
            diceLog = diceLog.filter(e => now - e.ts < 60000);
            return diceLog.reduce((s, e) => s + e.n, 0);
        }
        function recordDice(n) { diceLog.push({ ts: Date.now(), n }); }

        // --- Selection state ---
        let selectedFace  = null;   // e.g. "d6"
        let selectedLabel = null;   // e.g. "D6"
        let isPercentile  = false;
        let diceCount     = 1;

        // D100 always uses 2 physical dice (2×d10); others use diceCount
        function getPhysicalDice() { return isPercentile ? 2 : diceCount; }

        function updateUI() {
            const used    = IS_DM ? 0 : getDiceUsed();
            const cost    = getPhysicalDice();
            const canRoll = IS_DM || (used + cost <= RATE_LIMIT);

            if (!IS_DM) {
                const rem = Math.max(0, RATE_LIMIT - used);
                rateInfo.textContent = `${used} / ${RATE_LIMIT} dice used this minute  ·  ${rem} remaining`;
                rateInfo.classList.toggle('over-limit', used >= RATE_LIMIT);
            }

            if (!selectedFace) {
                confirmBtn.textContent = 'Select a die type';
                confirmBtn.disabled = true;
            } else if (!canRoll && !IS_DM) {
                confirmBtn.textContent = 'Rate limit reached — wait a moment';
                confirmBtn.disabled = true;
            } else {
                const rollLabel = isPercentile
                    ? 'D100'
                    : (diceCount > 1 ? `${diceCount}× ${selectedLabel}` : selectedLabel);
                confirmBtn.textContent = `Roll ${rollLabel}`;
                confirmBtn.disabled = busy;
            }

            countDownBtn.disabled = !selectedFace || isPercentile || diceCount <= 1;
            countUpBtn.disabled   = !selectedFace || isPercentile || diceCount >= 10;
        }

        // --- Die type selection ---
        diceTypeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                diceTypeBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedFace  = btn.dataset.face;
                selectedLabel = btn.dataset.label;
                isPercentile  = btn.dataset.percentile === 'true';
                if (isPercentile) diceCount = 1;
                countDisplay.textContent = diceCount;
                updateUI();
            });
        });

        countDownBtn.addEventListener('click', () => {
            if (diceCount > 1) { diceCount--; countDisplay.textContent = diceCount; updateUI(); }
        });
        countUpBtn.addEventListener('click', () => {
            if (diceCount < 10) { diceCount++; countDisplay.textContent = diceCount; updateUI(); }
        });

        // --- Overlay open / close ---
        openRollBtn.addEventListener('click', () => { overlay.classList.add('open'); updateUI(); });
        closeOverlayBtn.addEventListener('click', () => overlay.classList.remove('open'));
        // Close overlay when tapping the dice canvas
        diceContainer.addEventListener('click', () => overlay.classList.remove('open'));

        // --- DiceBox setup ---
        const panelH = bottomPanel.getBoundingClientRect().height;
        const diceW  = window.innerWidth;
        const diceH  = window.innerHeight - panelH;
        diceContainer.style.width  = diceW + 'px';
        diceContainer.style.height = diceH + 'px';

        const Box = new DiceBox({
            container:      "#dice-box",
            assetPath:      "/Dragonshard/assets/dice-box/assets/",
            theme:          "default",
            themeColor:     DICE_COLOR,
            labelColor:     "#ffffff",
            scale:          7,
            throwForce:     12,
            spinForce:      12,
            startingHeight: 15,
            width:          diceW,
            height:         diceH
        });

        await Box.init();
        Box.updateConfig({ width: diceW, height: diceH });
        engineStatus.innerText = "Arena Ready";
        openRollBtn.disabled = false;
        if (IS_DM) rateInfo.style.display = 'none';

        // --- Helpers ---
        const timeAgo = (ts) => {
            const s = Math.floor((Date.now() - ts) / 1000);
            if (s < 60)   return `${s}s ago`;
            if (s < 3600) return `${Math.floor(s / 60)}m ago`;
            return `${Math.floor(s / 3600)}h ago`;
        };

        const computeD100 = (v0, v1) => {
            const tens  = (v0 % 10) * 10;
            const units = v1 % 10;
            return (tens + units) === 0 ? 100 : tens + units;
        };

        // --- Firebase listeners ---
        onValue(allRef, (snapshot) => {
            const all = snapshot.val() || {};
            logEl.innerHTML = "";
            for (const [player, data] of Object.entries(all)) {
                if (!data || (Date.now() - data.timestamp) > 15000) continue;
                const mine = (player === PLAYER_NAME);
                const el   = document.createElement('div');
                el.className = `roll-note ${data.status}${mine ? ' mine' : ''}`;
                if (data.status === "rolling") {
                    el.textContent = mine
                        ? `Rolling ${data.label}…`
                        : `${player} is rolling ${data.label}…`;
                } else if (data.status === "complete") {
                    el.textContent = mine
                        ? `You rolled ${data.label}: ${data.display}`
                        : `${player} rolled ${data.label}: ${data.display}`;
                }
                logEl.appendChild(el);
            }
        });

        onValue(histRef, (snapshot) => {
            const raw = snapshot.val();
            if (!raw) {
                histListEl.innerHTML = '<em class="empty-note">No rolls yet</em>';
                return;
            }
            const entries = Object.values(raw).sort((a, b) => b.timestamp - a.timestamp);
            histListEl.innerHTML = "";
            for (const e of entries) {
                const div = document.createElement('div');
                div.className = "hist-entry";
                div.innerHTML =
                    `<span class="hist-who">${e.player}</span>` +
                    `<span class="hist-time">${timeAgo(e.timestamp)}</span><br>` +
                    `<span class="hist-roll">${e.label}: ${e.display}</span>`;
                histListEl.appendChild(div);
            }
        });

        const saveToHistory = async (entry) => {
            await push(histRef, entry);
            const snap = await get(histRef);
            const val  = snap.val();
            if (!val) return;
            const ordered = Object.entries(val)
                .sort((a, b) => a[1].timestamp - b[1].timestamp)
                .map(([k]) => k);
            if (ordered.length > MAX_HISTORY) {
                const toDelete = ordered.slice(0, ordered.length - MAX_HISTORY);
                await Promise.all(toDelete.map(k => remove(ref(db, `roll_history/${k}`))));
            }
        };

        // --- Roll execution ---
        let busy = false;

        confirmBtn.addEventListener('click', async () => {
            if (!selectedFace || busy) return;
            const cost = getPhysicalDice();
            if (!IS_DM) {
                if (getDiceUsed() + cost > RATE_LIMIT) { updateUI(); return; }
                recordDice(cost);
            }
            overlay.classList.remove('open');

            let notation, label;
            if (isPercentile) {
                notation = '2d10';
                label    = 'D100';
            } else {
                notation = `${diceCount}${selectedFace}`;
                label    = diceCount > 1
                    ? `${diceCount}d${selectedFace.slice(1)}`   // e.g. "3d6"
                    : selectedLabel;                              // e.g. "D6"
            }

            await doRoll(notation, label, isPercentile);
        });

        const doRoll = async (notation, label, perc = false) => {
            if (busy) return;
            busy = true;
            openRollBtn.disabled = true;
            confirmBtn.disabled  = true;
            try {
                await set(myRef, { notation, label, status: "rolling", timestamp: Date.now() });
                Box.clear();
                const results = await Box.roll(notation);
                const rawVals = results.map(r => r.value);
                let display, total;
                if (perc) {
                    total   = computeD100(rawVals[0], rawVals[1]);
                    display = String(total);
                } else {
                    total   = rawVals.reduce((a, b) => a + b, 0);
                    display = rawVals.length > 1
                        ? `[${rawVals.join(' + ')}] = ${total}`
                        : String(total);
                }
                await set(myRef, { notation, label, display, total, status: "complete", timestamp: Date.now() });
                await saveToHistory({ player: PLAYER_NAME, notation, label, display, total, timestamp: Date.now() });
                setTimeout(() => set(myRef, null), 10000);
            } catch (err) {
                console.error("Roll error:", err);
            } finally {
                busy = false;
                openRollBtn.disabled = false;
                updateUI();
            }
        };
    </script>
</body>
</html>
