<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soul Manifestation</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background-color: #00050f;
            display: flex; justify-content: center; align-items: center;
            font-family: 'serif'; color: white; overflow: hidden;
        }
        model-viewer {
            width: 100%; height: 100%;
            --poster-color: transparent;
        }
        .back-nav {
            position: absolute; top: 30px; left: 20px; z-index: 100;
            color: #3b82f6; text-decoration: none; text-transform: uppercase;
            letter-spacing: 2px; font-size: 11px;
            border: 1px solid rgba(59,130,246,0.3);
            padding: 8px 15px; border-radius: 20px;
            background: rgba(0,5,20,0.7); backdrop-filter: blur(5px);
        }
        .lore-container {
            position: absolute; bottom: 40px; text-align: center; width: 100%;
            pointer-events: none;
            background: linear-gradient(to top, #00050fe6 0%, transparent 100%);
            padding-bottom: 20px; padding-top: 40px;
        }
        h1 {
            font-size: 26px; letter-spacing: 4px; text-transform: uppercase;
            color: rgba(210,228,255,0.85); text-shadow: 0 0 15px rgba(59,130,246,0.8);
            margin-bottom: 5px;
        }
        p { font-size: 14px; letter-spacing: 2px; color: rgba(130,175,255,0.7); text-transform: uppercase; }
    </style>
</head>
<body>
    <a href="Hub.html" class="back-nav">← Hub</a>
    <model-viewer
        src="../Model/Glacivox.glb"
        alt="Glacivox's Manifested Soul"
        auto-rotate camera-controls bounds="tight"
        shadow-intensity="1.5" exposure="1.2">
    </model-viewer>
    <div class="lore-container">
        <h1>Glacivox's Manifested Soul</h1>
        <p>Swipe to Inspect the Shard</p>
    </div>
</body>
</html>
