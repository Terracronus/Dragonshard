<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragonshard Hub</title>
    <style>
        body {
            margin: 0; background: #00050f; color: white; font-family: 'serif';
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            background-image: radial-gradient(circle, #000d20 0%, #000005 100%);
        }
        .menu {
            text-align: center; border: 1px solid rgba(59,130,246,0.2);
            padding: 50px 30px; border-radius: 20px; background: rgba(0,10,30,0.5);
            backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(59,130,246,0.1);
        }
        h1 {
            font-size: 26px; letter-spacing: 5px; color: #3b82f6;
            text-shadow: 0 0 15px rgba(59,130,246,0.8);
            margin-bottom: 40px; text-transform: uppercase;
        }
        .btn {
            display: block; width: 240px; margin: 20px auto; padding: 22px;
            background: rgba(0,5,20,0.7); border: 1px solid #3b82f6; color: rgba(210,228,255,0.85);
            text-decoration: none; text-transform: uppercase; letter-spacing: 3px;
            border-radius: 4px; transition: all 0.4s ease; font-size: 14px;
        }
        .btn:active {
            background: #3b82f6; color: white;
            box-shadow: 0 0 25px rgba(59,130,246,0.8);
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="menu">
        <h1>Glacivox's Dragonshard</h1>
        <a href="Mini.html" class="btn">Manifest Soul</a>
