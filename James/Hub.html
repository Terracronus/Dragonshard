<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragonshard Hub</title>
    <style>
        body { 
            margin: 0; background: #0a0002; color: white; font-family: 'serif'; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
            background-image: radial-gradient(circle, #1a0005 0%, #000000 100%);
        }
        .menu { 
            text-align: center; border: 1px solid rgba(255, 50, 100, 0.2); 
            padding: 50px 30px; border-radius: 20px; background: rgba(20, 0, 5, 0.6);
            backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(255, 0, 50, 0.1);
        }
        h1 { font-size: 26px; letter-spacing: 5px; color: #ff3366; text-shadow: 0 0 15px #ff0033; margin-bottom: 40px; text-transform: uppercase; }
        .btn {
            display: block; width: 240px; margin: 20px auto; padding: 22px;
            background: rgba(40, 0, 10, 0.5); border: 1px solid #ff3366; color: #ffcccc;
            text-decoration: none; text-transform: uppercase; letter-spacing: 3px;
            border-radius: 4px; transition: all 0.4s ease; font-size: 14px;
        }
        .btn:active { background: #ff3366; color: white; box-shadow: 0 0 25px #ff3366; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="menu">
        <h1>Larris' Dragonshard</h1>
        <a href="Mini.html" class="btn">Manifest Soul</a>
        <a href="Roll.html" class="btn">Dice Roller</a>
    </div>
</body>
</html>
