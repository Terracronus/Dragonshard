<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .arcane-link {
            position: relative; z-index: 10; padding: 22px 45px;
            font-family: 'serif'; font-size: 18px; color: rgba(255,255,255,0.7);
            text-transform: uppercase; text-decoration: none; letter-spacing: 4px;
            background: rgba(10, 0, 20, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(140, 0, 255, 0.3); border-radius: 60px;
            box-shadow: 0 0 20px rgba(140, 0, 255, 0.2); text-align: center;
            transition: all 0.5s ease;
        }
        .arcane-link:hover { color: white; border-color: rgba(140, 0, 255, 0.8); box-shadow: 0 0 30px rgba(140, 0, 255, 0.5); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <a href="https://YOUR-SECRET-LINK.com" class="arcane-link">Gaze Into the Shard</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let glows = [];
        const particleCount = 200;
        const glowCount = 4; // Fewer, dimmer background glows

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class AmbientGlow {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 300 + Math.random() * 400;
                this.alpha = 0;
                this.maxAlpha = 0.02 + Math.random() * 0.05; // Extremely dim
                this.speed = 0.0003 + Math.random() * 0.0007; // Very slow pulse
                this.state = 'rising'; 
                this.hue = 260 + Math.random() * 40;
            }
            update() {
                if (this.state === 'rising') {
                    this.alpha += this.speed;
                    if (this.alpha >= this.maxAlpha) this.state = 'falling';
                } else {
                    this.alpha -= this.speed;
                    if (this.alpha <= 0) this.init();
                }
            }
            draw() {
                const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                grd.addColorStop(0, `hsla(${this.hue}, 100%, 50%, ${this.alpha})`);
                grd.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);
                ctx.fillStyle = grd;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Particle {
            constructor() { this.init(true); }
            init(isFirstLoad = false) {
                this.angle = Math.random() * Math.PI * 2;
                this.radiusBase = 150 + Math.random() * 200;
                this.z = isFirstLoad ? Math.random() * 1000 : 1000;
                this.speed = 0.4 + Math.random() * 0.6; // Glacial movement
                this.rotationSpeed = 0.001 + Math.random() * 0.002; // Barely swirling
                this.wobble = Math.random() * 20;
                this.hue = 260 + Math.random() * 30;
            }
            update() {
                this.z -= this.speed;
                this.angle += this.rotationSpeed;
                if (this.z < 1) this.init();
                const scale = 400 / (400 + this.z);
                const currentRadius = this.radiusBase + Math.sin(this.z * 0.01 + this.wobble) * 30;
                this.x = canvas.width / 2 + Math.cos(this.angle) * currentRadius * (1 + (1000 - this.z) / 400);
                this.y = canvas.height / 2 + Math.sin(this.angle) * currentRadius * (1 + (1000 - this.z) / 400);
                this.alpha = Math.min(0.15, (1000 - this.z) / 2000); // Subdued brightness
            }
            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 70%, 70%, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 1, 0, Math.PI * 2); ctx.fill();
            }
        }

        function setup() {
            for (let i = 0; i < glowCount; i++) glows.push(new AmbientGlow());
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)'; // Slightly faster clear to avoid clutter
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';
            glows.forEach(g => { g.update(); g.draw(); });
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        setup();
        animate();
    </script>
</body>
</html>
