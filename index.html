<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .arcane-link {
            position: relative; z-index: 10; padding: 22px 45px;
            font-family: 'serif'; font-size: 18px; color: white;
            text-transform: uppercase; text-decoration: none; letter-spacing: 4px;
            background: rgba(30, 0, 60, 0.3); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(140, 0, 255, 0.4); border-radius: 60px;
            box-shadow: 0 0 25px rgba(140, 0, 255, 0.3); animation: pulse 4s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 40px rgba(180, 100, 255, 0.6); } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <a href="https://YOUR-SECRET-LINK.com" class="arcane-link">Gaze Into the Shard</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 60; // Fewer, larger, softer particles

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init(true);
            }
            init(isFirstLoad = false) {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 100 + Math.random() * 150;
                this.z = isFirstLoad ? Math.random() * 1000 : 1000;
                this.speed = 2 + Math.random() * 2; // Slower for "ethereal" feel
                this.rotationSpeed = 0.005 + Math.random() * 0.01;
                this.hue = 260 + Math.random() * 40; // Purples and magentas
                this.sizeBase = 5 + Math.random() * 15;
            }
            update() {
                this.z -= this.speed;
                this.angle += this.rotationSpeed;
                if (this.z < 1) this.init();

                const scale = 400 / (400 + this.z);
                this.x = canvas.width / 2 + Math.cos(this.angle) * this.radius * (1 + (1000 - this.z) / 300);
                this.y = canvas.height / 2 + Math.sin(this.angle) * this.radius * (1 + (1000 - this.z) / 300);
                this.alpha = Math.min(0.5, (1000 - this.z) / 1500);
                this.size = this.sizeBase * scale * 5;
            }
            draw() {
                // Radial gradient for "wispy" soft edges
                const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                grd.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${this.alpha})`);
                grd.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${this.alpha * 0.3})`);
                grd.addColorStop(1, `hsla(${this.hue}, 100%, 20%, 0)`);
                
                ctx.fillStyle = grd;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function setup() {
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animate() {
            // "Ghosting" effect - don't clear the screen fully to create trails
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Additive blending makes overlapping magic look brighter
            ctx.globalCompositeOperation = 'lighter';

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        setup();
        animate();
    </script>
</body>
</html>
