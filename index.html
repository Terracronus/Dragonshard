<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .arcane-link {
            position: relative; z-index: 10; padding: 22px 45px;
            font-family: 'serif'; font-size: 18px; color: white;
            text-transform: uppercase; text-decoration: none; letter-spacing: 4px;
            background: rgba(20, 0, 40, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(140, 0, 255, 0.5); border-radius: 60px;
            box-shadow: 0 0 20px rgba(140, 0, 255, 0.4); animation: pulse 3s infinite; text-align: center;
        }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(140, 0, 255, 0.4); border-color: rgba(140, 0, 255, 0.5); } 50% { box-shadow: 0 0 50px rgba(212, 170, 255, 0.7); border-color: rgba(255, 255, 255, 0.8); } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <a href="https://YOUR-SECRET-LINK.com" class="arcane-link">Gaze Into the Shard</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 180; // More particles for a denser wall

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init(true);
            }
            init(isFirstLoad = false) {
                this.angle = Math.random() * Math.PI * 2;
                // This ensures they stay AWAY from the center (min 150 radius)
                this.baseRadius = 150 + Math.random() * 100; 
                this.z = isFirstLoad ? Math.random() * 1000 : 1000;
                this.speed = 4 + Math.random() * 3;
                this.rotationSpeed = 0.01 + Math.random() * 0.02;
            }
            update() {
                this.z -= this.speed;
                this.angle += this.rotationSpeed;
                
                if (this.z < 1) this.init();

                // 3D to 2D math
                const perspective = 300 / (300 + this.z);
                this.x = canvas.width / 2 + Math.cos(this.angle) * this.baseRadius * (1 + (1000 - this.z) / 200);
                this.y = canvas.height / 2 + Math.sin(this.angle) * this.baseRadius * (1 + (1000 - this.z) / 200);
                
                // Opacity increases as they get closer
                this.alpha = Math.min(1, (1000 - this.z) / 600);
                this.size = (1 - this.z / 1000) * 4;
            }
        }

        function setup() {
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dz = particles[i].z - particles[j].z;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // Only connect if they are close in 2D space AND 3D depth
                    // This prevents lines crossing through the center "void"
                    if (dist < 110 && Math.abs(dz) < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(160, 100, 255, ${particles[i].alpha * 0.3})`;
                        ctx.lineWidth = 0.8;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => p.update());
            drawLines();
            
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        setup();
        animate();
    </script>
</body>
</html>
