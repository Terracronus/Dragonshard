<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dragonshard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .arcane-link {
            position: relative; z-index: 10; padding: 22px 45px;
            font-family: 'serif'; font-size: 18px; color: rgba(255,220,220,0.8);
            text-transform: uppercase; text-decoration: none; letter-spacing: 4px;
            background: rgba(25, 0, 5, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 50, 100, 0.3); border-radius: 60px;
            box-shadow: 0 0 20px rgba(200, 0, 50, 0.2); text-align: center;
            transition: all 0.8s ease;
        }
        .arcane-link:hover { color: white; border-color: rgba(255, 100, 150, 0.8); box-shadow: 0 0 40px rgba(255, 0, 80, 0.4); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <a href="carlo-secret.html" class="arcane-link">Gaze Into the Shard</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let glows = [];
        const particleCount = 220;
        const glowCount = 8;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class AmbientGlow {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 80 + Math.random() * 150; 
                this.alpha = 0;
                this.maxAlpha = 0.04 + Math.random() * 0.08; 
                this.speed = 0.0004 + Math.random() * 0.0008; 
                this.state = 'rising'; 
                this.hue = (Math.random() > 0.5) ? 340 + Math.random() * 20 : Math.random() * 15;
            }
            update() {
                if (this.state === 'rising') {
                    this.alpha += this.speed;
                    if (this.alpha >= this.maxAlpha) this.state = 'falling';
                } else {
                    this.alpha -= this.speed;
                    if (this.alpha <= 0) this.init();
                }
            }
            draw() {
                const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                grd.addColorStop(0, `hsla(${this.hue}, 100%, 40%, ${this.alpha})`);
                grd.addColorStop(1, `hsla(${this.hue}, 100%, 40%, 0)`);
                ctx.fillStyle = grd;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Particle {
            constructor() { this.init(true); }
            init(isFirstLoad = false) {
                this.angle = Math.random() * Math.PI * 2;
                this.radiusBase = 80 + Math.random() * 120;
                this.z = isFirstLoad ? Math.random() * 1000 : 1000;
                this.speed = 0.4 + Math.random() * 0.7; 
                this.rotationSpeed = 0.001 + Math.random() * 0.003; 
                this.wobble = Math.random() * 20;
                this.hue = (Math.random() > 0.5) ? 345 + Math.random() * 15 : Math.random() * 10;
            }
            update() {
                this.z -= this.speed;
                this.angle += this.rotationSpeed;
                if (this.z < 1) this.init();
                const scale = 400 / (400 + this.z);
                const currentRadius = this.radiusBase + Math.sin(this.z * 0.01 + this.wobble) * 25;
                this.x = canvas.width / 2 + Math.cos(this.angle) * currentRadius * (1 + (1000 - this.z) / 400);
                this.y = canvas.height / 2 + Math.sin(this.angle) * currentRadius * (1 + (1000 - this.z) / 400);
                this.alpha = Math.min(0.2, (1000 - this.z) / 2000); 
            }
            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 90%, 65%, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 1, 0, Math.PI * 2); ctx.fill();
            }
        }

        function setup() {
            for (let i = 0; i < glowCount; i++) glows.push(new AmbientGlow());
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';
            glows.forEach(g => { g.update(); g.draw(); });
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        setup();
        animate();
    </script>
</body>
</html>
