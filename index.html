<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .arcane-link {
            position: relative; z-index: 10; padding: 22px 45px;
            font-family: 'serif'; font-size: 18px; color: white;
            text-transform: uppercase; text-decoration: none; border-radius: 60px;
            letter-spacing: 4px; background: rgba(30, 0, 60, 0.5); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(180, 100, 255, 0.5);
            box-shadow: 0 0 25px rgba(140, 0, 255, 0.4); animation: pulse 3s infinite;
        }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(140, 0, 255, 0.3); } 50% { box-shadow: 0 0 60px rgba(212, 170, 255, 0.6); border-color: #fff; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <a href="https://YOUR-SECRET-LINK.com" class="arcane-link">Gaze Into the Shard</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 220; // Increased for a thicker "web"

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.init(true); }
            init(first) {
                this.angle = Math.random() * Math.PI * 2;
                this.baseRadius = 140 + Math.random() * 80; 
                this.z = first ? Math.random() * 1000 : 1000;
                this.speed = 1.2 + Math.random() * 1.5; // MUCH slower flight
                this.rotation = 0.004 + Math.random() * 0.008; // Slower swirl
            }
            update() {
                this.z -= this.speed;
                this.angle += this.rotation;
                if (this.z < 1) this.init();

                const perspective = 400 / (400 + this.z);
                const drift = (1000 - this.z) / 180;
                this.x = canvas.width / 2 + Math.cos(this.angle) * (this.baseRadius + drift * 20) * perspective * 2;
                this.y = canvas.height / 2 + Math.sin(this.angle) * (this.baseRadius + drift * 20) * perspective * 2;
                this.alpha = Math.min(0.8, (1000 - this.z) / 800);
            }
        }

        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => p.update());

            // Connect the dots
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // Loosened logic: Dots connect more easily now
                    if (dist < 140 && Math.abs(particles[i].z - particles[j].z) < 200) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(180, 130, 255, ${particles[i].alpha * 0.4})`;
                        ctx.lineWidth = 0.7;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }

        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        draw();
    </script>
</body>
</html>
