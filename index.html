<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .arcane-link {
            position: relative; z-index: 10; padding: 22px 45px;
            font-family: 'serif'; font-size: 20px; color: white;
            text-transform: uppercase; text-decoration: none; letter-spacing: 4px;
            background: rgba(40, 0, 80, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 60px;
            box-shadow: 0 0 30px rgba(140, 0, 255, 0.5); animation: pulse 3s infinite; text-align: center;
        }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(140, 0, 255, 0.4); } 50% { box-shadow: 0 0 50px rgba(212, 170, 255, 0.7); } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <a href="https://YOUR-SECRET-LINK.com" class="arcane-link">Gaze Into the Shard</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 150; // Increased for more webbing

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
                this.z = Math.random() * 1000; // Randomize start depth
            }
            init() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 20 + Math.random() * 50; // Inner radius of the tunnel
                this.z = 1000; // Start at the "back"
                this.speed = 3 + Math.random() * 2;
                this.rotation = (Math.random() - 0.5) * 0.02; // How fast it swirls
            }
            update() {
                this.z -= this.speed;
                this.angle += this.rotation; // The "Swirl" factor
                
                if (this.z < 1) this.init();

                // Projection
                const scale = 500 / this.z;
                this.x = Math.cos(this.angle) * this.radius * scale + canvas.width / 2;
                this.y = Math.sin(this.angle) * this.radius * scale + canvas.height / 2;
                this.size = scale * 0.8;
                this.alpha = (1000 - this.z) / 1000;
            }
        }

        function setup() {
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // Webbing logic - tighter distance = more "Plexus" feel
                    if (dist < 80 && particles[i].z < 800) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(200, 200, 255, ${particles[i].alpha * 0.2})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            drawLines();
            requestAnimationFrame(animate);
        }

        setup();
        animate();
    </script>
</body>
</html>
