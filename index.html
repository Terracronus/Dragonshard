<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .arcane-link {
            position: relative; z-index: 10; padding: 22px 45px;
            font-family: 'serif'; font-size: 18px; color: white;
            text-transform: uppercase; text-decoration: none; letter-spacing: 4px;
            background: rgba(10, 0, 20, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(140, 0, 255, 0.6); border-radius: 60px;
            box-shadow: 0 0 20px rgba(140, 0, 255, 0.4); text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <a href="https://YOUR-SECRET-LINK.com" class="arcane-link">Gaze Into the Shard</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 250; // High count for "thread" look

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init(true);
            }
            init(isFirstLoad = false) {
                this.angle = Math.random() * Math.PI * 2;
                this.radiusBase = 120 + Math.random() * 150;
                this.z = isFirstLoad ? Math.random() * 1000 : 1000;
                this.speed = 2 + Math.random() * 2;
                this.rotationSpeed = 0.005 + Math.random() * 0.01;
                // Add a "wobble" frequency to make it look like smoke
                this.wobble = Math.random() * 10; 
                this.hue = 260 + Math.random() * 30;
            }
            update() {
                this.z -= this.speed;
                this.angle += this.rotationSpeed;
                if (this.z < 1) this.init();

                const scale = 400 / (400 + this.z);
                // The Wobble: adding a Sine wave to the radius makes it "wispy"
                const currentRadius = this.radiusBase + Math.sin(this.z * 0.02 + this.wobble) * 40;
                
                this.x = canvas.width / 2 + Math.cos(this.angle) * currentRadius * (1 + (1000 - this.z) / 400);
                this.y = canvas.height / 2 + Math.sin(this.angle) * currentRadius * (1 + (1000 - this.z) / 400);
                this.alpha = Math.min(0.4, (1000 - this.z) / 1000);
            }
            draw() {
                // Tiny points, not big gradients
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function setup() {
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animate() {
            // Keep the trails LONG (0.05 instead of 0.1) to create silk threads
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.globalCompositeOperation = 'lighter';

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        setup();
        animate();
    </script>
</body>
</html>
