<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Shard</title>
    <style>
        /* Force the page to be a perfect, non-scrolling full screen */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This ensures the GIF stretches to fill any phone screen perfectly */
        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* This prevents the "black bars" effect */
            z-index: 1;
            opacity: 0.8; /* Slightly dimmed so the button pops */
        }

        /* The Arcane Button */
        .arcane-link {
            position: relative;
            z-index: 10;
            padding: 22px 45px;
            font-family: 'serif';
            font-size: 20px;
            color: white;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 4px;
            background: rgba(75, 0, 130, 0.4); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(140, 0, 255, 0.6);
            animation: portal-glow 3s infinite ease-in-out;
            text-align: center;
            text-shadow: 0px 0px 10px rgba(255,255,255,0.7);
        }

        @keyframes portal-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(140, 0, 255, 0.4); border-color: rgba(255,255,255,0.3); }
            50% { box-shadow: 0 0 45px rgba(212, 170, 255, 0.8); border-color: rgba(255,255,255,0.9); }
        }
    </style>
</head>
<body>

    <img src="vortexgif.gif" alt="Magic Vortex" class="magic-bg">

    <a href="https://YOUR-SECRET-LINK.com" class="arcane-link">
        Gaze Into the Shard
    </a>

</body>
</html>
