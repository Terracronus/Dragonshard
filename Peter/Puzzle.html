<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcane Trials — Peter</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ac:   #c2773a;
            --ar:   194;
            --ag:   119;
            --ab:   58;
        }
        body {
            background: #0a0400;
            background-image: radial-gradient(circle, #1a0d00 0%, #050200 100%);
            color: white; font-family: serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .back-nav {
            position: absolute; top: 14px; left: 14px; z-index: 100;
            color: var(--ac); text-decoration: none; font-size: 11px;
            border: 1px solid rgba(var(--ar),var(--ag),var(--ab),0.35);
            padding: 7px 14px; border-radius: 20px;
            background: rgba(0,0,0,0.5);
            text-transform: uppercase; letter-spacing: 2px;
        }
        #gc {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 20px 20px;
        }
        /* Waiting */
        .w-glyph {
            font-size: 60px; color: var(--ac); opacity: 0.3;
            animation: pulse 2.5s ease-in-out infinite;
            margin-bottom: 18px;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.15; transform: scale(1); }
            50%      { opacity: 0.55; transform: scale(1.06); }
        }
        .w-text {
            font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
            color: rgba(255,255,255,0.25);
        }
        /* Headings */
        .ph-title {
            font-size: 20px; letter-spacing: 5px; text-transform: uppercase;
            color: var(--ac); text-shadow: 0 0 18px var(--ac);
            margin-bottom: 6px; text-align: center;
        }
        .ph-sub {
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
            color: rgba(255,255,255,0.25); text-align: center; margin-bottom: 28px;
        }
        /* Puzzle selector */
        .pz-grid {
            display: flex; flex-direction: column; gap: 14px; width: 270px;
        }
        .pz-card {
            background: rgba(5,5,15,0.75);
            border: 1px solid rgba(var(--ar),var(--ag),var(--ab),0.35);
            color: rgba(220,220,245,0.85);
            padding: 18px 22px; border-radius: 8px;
            cursor: pointer; text-align: left; font-family: serif;
            transition: all 0.3s ease; width: 100%;
        }
        .pz-card:active {
            background: rgba(var(--ar),var(--ag),var(--ab),0.15);
            box-shadow: 0 0 18px rgba(var(--ar),var(--ag),var(--ab),0.3);
            transform: scale(0.97);
        }
        .pz-card.locked { opacity: 0.3; cursor: not-allowed; }
        .pz-name { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 3px; }
        .pz-desc { font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.35); text-transform: uppercase; }
        /* Ready list */
        .rdy-list { display: flex; flex-direction: column; gap: 7px; width: 240px; }
        .rdy-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 14px; background: rgba(255,255,255,0.04);
            border-radius: 6px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
        }
        .rdy-row .rname { color: rgba(255,255,255,0.45); }
        .rdy-row .rstatus { color: rgba(255,255,255,0.18); }
        .rdy-row.yes .rstatus { color: #44ff78; }
        .rdy-row.yes { background: rgba(68,255,120,0.05); }
        /* Ready button */
        .btn-rdy {
            width: 200px; padding: 22px 10px;
            font-size: 15px; letter-spacing: 4px; text-transform: uppercase;
            font-family: serif; cursor: pointer;
            background: rgba(5,5,18,0.8);
            border: 2px solid var(--ac); color: var(--ac);
            border-radius: 8px; transition: all 0.4s ease;
            margin-bottom: 28px; display: block;
        }
        .btn-rdy.confirmed {
            background: rgba(68,255,120,0.12);
            border-color: #44ff78; color: #44ff78;
            box-shadow: 0 0 22px rgba(68,255,120,0.25);
            cursor: default;
        }
        /* Cancel */
        .btn-cancel {
            background: none;
            border: 1px solid rgba(255,70,85,0.4);
            color: rgba(255,70,85,0.55);
            padding: 9px 20px; border-radius: 6px;
            font-family: serif; font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; margin-top: 20px;
        }
        /* Strike Button for Puzzle 2 */
        .btn-strike {
            width: 180px; height: 180px; border-radius: 50%;
            background: rgba(5,5,18,0.8);
            border: 4px solid var(--ac); color: var(--ac);
            font-size: 24px; letter-spacing: 5px; text-transform: uppercase;
            font-family: serif; cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(var(--ar),var(--ag),var(--ab),0.3);
            margin: 30px auto; display: flex; align-items: center; justify-content: center;
        }
        .btn-strike:active {
            transform: scale(0.92);
            box-shadow: 0 0 40px var(--ac);
            background: rgba(var(--ar),var(--ag),var(--ab),0.2);
        }
        .btn-strike.confirmed {
            background: rgba(68,255,120,0.15);
            border-color: #44ff78; color: #44ff78;
            box-shadow: 0 0 30px rgba(68,255,120,0.3);
            cursor: default; transform: none;
        }
        /* Countdown */
        .cnt-num {
            font-size: 110px; font-weight: bold; line-height: 1;
            color: var(--ac); text-shadow: 0 0 40px var(--ac);
            animation: cntPop 0.3s ease-out;
        }
        @keyframes cntPop {
            0%   { transform: scale(1.4); opacity: 0; }
            100% { transform: scale(1);   opacity: 1; }
        }
        .cnt-label {
            font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
            color: rgba(255,255,255,0.25); margin-top: 14px;
        }
        /* Round labels */
        .rnd-bar {
            font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
            color: rgba(255,255,255,0.25); margin-bottom: 10px; text-align: center;
        }
        .role-badge {
            font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 16px; margin-bottom: 18px; display: inline-block;
        }
        .role-desc {
            background: rgba(255,200,50,0.12);
            border: 1px solid rgba(255,200,50,0.35); color: #ffc832;
        }
        .role-guess {
            background: rgba(var(--ar),var(--ag),var(--ab),0.1);
            border: 1px solid rgba(var(--ar),var(--ag),var(--ab),0.3); color: var(--ac);
        }
        /* Symbol large (describer) */
        .sym-lg {
            width: 160px; height: 160px; margin: 0 auto 16px;
            color: #ffc832; filter: drop-shadow(0 0 18px rgba(255,200,50,0.35));
        }
        .sym-lg svg { width: 100%; height: 100%; }
        .desc-instr {
            font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
            color: rgba(255,200,50,0.55); text-align: center; margin-bottom: 20px;
        }
        /* Symbol grid (guesser) */
        .sym-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; width: 260px; margin-bottom: 18px;
        }
        .sym-btn {
            aspect-ratio: 1;
            background: rgba(5,5,18,0.8);
            border: 2px solid rgba(var(--ar),var(--ag),var(--ab),0.25);
            border-radius: 10px; cursor: pointer;
            color: var(--ac); padding: 14px;
            transition: all 0.18s ease; font-family: serif;
        }
        .sym-btn svg { width: 100%; height: 100%; }
        .sym-btn:disabled { cursor: default; }
        .sym-btn.selected {
            background: rgba(var(--ar),var(--ag),var(--ab),0.18);
            border-color: var(--ac);
            box-shadow: 0 0 18px rgba(var(--ar),var(--ag),var(--ab),0.35);
        }
        /* Timer */
        .timer-wrap { width: 220px; margin: 0 auto; }
        .timer-track {
            height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; overflow: hidden; margin-bottom: 8px;
        }
        .timer-fill {
            height: 100%; border-radius: 2px;
            background: var(--ac); transition: width 0.08s linear, background 0.3s;
        }
        .timer-fill.urgent { background: #ff4455; }
        .timer-sec {
            text-align: center; font-size: 26px; font-weight: bold;
            color: var(--ac);
        }
        /* DM view during round */
        .dm-box {
            display: flex; flex-direction: column; align-items: center;
            gap: 10px; width: 280px; text-align: center;
        }
        .dm-sec {
            font-size: 56px; font-weight: bold;
            color: var(--ac); text-shadow: 0 0 22px var(--ac);
            line-height: 1;
        }
        .dm-desc-lbl {
            font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
            color: rgba(255,255,255,0.45);
        }
        .dm-vlist { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .dm-vrow {
            display: flex; justify-content: space-between; padding: 7px 12px;
            background: rgba(255,255,255,0.04); border-radius: 5px;
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            color: rgba(255,255,255,0.35);
        }
        .dm-vrow.voted {
            background: rgba(var(--ar),var(--ag),var(--ab),0.1);
            color: var(--ac);
        }
        /* Reveal */
        .rv-sym {
            width: 110px; height: 110px; margin: 0 auto 12px;
            color: #ffc832; filter: drop-shadow(0 0 14px rgba(255,200,50,0.35));
        }
        .rv-sym svg { width: 100%; height: 100%; }
        .rv-outcome {
            font-size: 18px; letter-spacing: 5px; text-transform: uppercase;
            text-align: center; margin-bottom: 16px;
        }
        .rv-outcome.win  { color: #44ff78; text-shadow: 0 0 18px rgba(68,255,120,0.4); }
        .rv-outcome.lose { color: #ff4455; text-shadow: 0 0 18px rgba(255,68,85,0.35); }
        .rv-rows { display: flex; flex-direction: column; gap: 7px; width: 230px; margin-bottom: 16px; }
        .rv-row {
            display: flex; justify-content: space-between; padding: 7px 12px;
            border-radius: 5px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
        }
        .rv-row.ok  { background: rgba(68,255,120,0.08); border: 1px solid rgba(68,255,120,0.25); color: #44ff78; }
        .rv-row.bad { background: rgba(255,68,85,0.08);  border: 1px solid rgba(255,68,85,0.22); color: #ff6677; }
        .score-line {
            font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
            color: rgba(255,255,255,0.3); text-align: center; margin-bottom: 20px;
        }
        /* Buttons */
        .btn-action {
            padding: 14px 28px; font-family: serif;
            font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
            background: rgba(5,5,18,0.8);
            border: 1px solid var(--ac); color: var(--ac);
            border-radius: 6px; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-action:active {
            background: rgba(var(--ar),var(--ag),var(--ab),0.18);
            box-shadow: 0 0 18px rgba(var(--ar),var(--ag),var(--ab),0.35);
            transform: scale(0.97);
        }
        /* Game over */
        .go-head {
            font-size: 12px; letter-spacing: 5px; text-transform: uppercase;
            color: rgba(255,255,255,0.25); margin-bottom: 14px; text-align: center;
        }
        .go-score {
            font-size: 80px; font-weight: bold; line-height: 1;
            color: var(--ac); text-shadow: 0 0 35px var(--ac); text-align: center;
        }
        .go-max { font-size: 22px; color: rgba(255,255,255,0.25); }
        .go-title {
            font-size: 16px; letter-spacing: 5px; text-transform: uppercase;
            color: var(--ac); text-align: center; margin: 14px 0 5px;
        }
        .go-sub {
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
            color: rgba(255,255,255,0.25); text-align: center; margin-bottom: 28px;
        }
    </style>
</head>
<body>

    <div id="gc"></div>

    <script type="module">
        import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        /* ──────────────────────── PLAYER CONFIG */
        const PLAYER_NAME  = 'Peter';
        const IS_DM        = false;
        const GAME_PLAYERS = ['James','Lewis','Paige','Peter'];

        /* ──────────────────────── FIREBASE */
        const FB = {
            apiKey:            "AIzaSyA4wjtRUU5eTxBKMrYp615Ynqo2c5LSjsI",
            authDomain:        "terracronus-dragonshard.firebaseapp.com",
            projectId:         "terracronus-dragonshard",
            storageBucket:     "terracronus-dragonshard.firebasestorage.app",
            messagingSenderId: "479723332460",
            appId:             "1:479723332460:web:2ea5b21c67ddc70b018949",
            databaseURL:       "https://terracronus-dragonshard-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        const app   = initializeApp(FB);
        const db    = getDatabase(app);
        const GREF  = ref(db,'puzzle_game');
        const VREF  = ref(db,'puzzle_game/votes');
        const RREF  = ref(db,'puzzle_game/ready');

        /* ──────────────────────── SYMBOLS (8 arcane glyphs) */
        const S = [
            { name:'The Ring',
               svg:`<circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="9"/>
                    <circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="9"/>` },
            { name:'The Spiral',
               svg:`<path d="M50,50 C53,46 60,44 64,49 C70,56 65,66 56,69 C44,74 30,65 28,52 C24,36 36,21 52,20 C70,18 84,33 84,50 C84,70 68,84 48,82" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round"/>` },
            { name:'The Crescent',
               svg:`<path d="M50,12 A38,38 0 1,0 50,88 A27,27 0 1,1 50,12 Z" fill="currentColor"/>` },
            { name:'The Bolt',
               svg:`<path d="M60,8 L32,50 L51,50 L40,92 L72,46 L53,46 Z" fill="currentColor"/>` },
            { name:'The Eye',
               svg:`<path d="M8,50 Q50,8 92,50 Q50,92 8,50 Z" fill="none" stroke="currentColor" stroke-width="9"/>
                    <circle cx="50" cy="50" r="15" fill="currentColor"/>` },
            { name:'The Flame',
               svg:`<path d="M50,88 C23,73 17,51 30,35 C36,47 41,47 44,40 C49,25 52,10 57,22 C62,34 57,46 64,46 C70,30 73,18 73,32 C82,50 76,73 50,88 Z" fill="currentColor"/>` },
            { name:'The Star',
               svg:`<polygon points="50,8 61,36 92,36 68,55 77,85 50,67 23,85 32,55 8,36 39,36" fill="none" stroke="currentColor" stroke-width="7"/>` },
            { name:'The Rune',
               svg:`<line x1="50" y1="8"  x2="50" y2="92" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
                    <line x1="14" y1="34" x2="86" y2="34" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
                    <line x1="14" y1="60" x2="50" y2="60" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>` },
        ];

        /* ──────────────────────── SEEDED RNG */
        function rng32(seed) {
            return function() {
                seed |= 0; seed = seed + 0x6D2B79F5 | 0;
                let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }
        
        function shuffle(arr, rng) {
            const a=[...arr];
            for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
            return a;
        }
        
        function getRound(seed, round) {
            const rng = rng32(((seed*997)+(round*101))>>>0);
            const sym = shuffle([0,1,2,3,4,5,6,7], rng);
            const tgt = sym[0];
            const nt  = sym.slice(1);
            const po  = shuffle([...GAME_PLAYERS], rng32((seed*503)>>>0));
            const desc= po[round];
            const layouts={};
            for(const p of GAME_PLAYERS){
                if(p===desc){ layouts[p]=[tgt]; }
                else{
                    const sh=shuffle(nt,rng);
                    layouts[p]=shuffle([tgt,sh[0],sh[1],sh[2]],rng);
                }
            }
            return {tgt,desc,layouts};
        }

        function getTourney(GS) {
            const seed = GS.gameSeed;
            const po = shuffle([...GAME_PLAYERS], rng32((seed*503)>>>0));
            const t = GS.tourney || {};
            let m0 = [], m1 = [];
            let matchId = '';
            let opp = '';
            
            if (GS.round === 0) {
                m0 = [po[0], po[1]];
                m1 = [po[2], po[3]];
            } else {
                m0 = [t.w0, t.w1];
                m1 = [t.l0, t.l1];
            }
            
            if (m0.includes(PLAYER_NAME)) { matchId = 'm0'; opp = m0.find(p => p !== PLAYER_NAME); }
            if (m1.includes(PLAYER_NAME)) { matchId = 'm1'; opp = m1.find(p => p !== PLAYER_NAME); }
            
            return { m0, m1, matchId, opp, po };
        }
        
        function getDuelSyms(seed, round, player, score) {
            const hash = player.split('').reduce((a,b)=>a+b.charCodeAt(0),0);
            const rng = rng32(((seed*13) + (round*97) + (score*31) + hash) >>> 0);
            const all = shuffle([0,1,2,3,4,5,6,7], rng);
            const tgt = all[0];
            const opts = shuffle([all[0], all[1], all[2], all[3]], rng);
            return { tgt, opts };
        }

        /* ──────────────────────── TIMING */
        const CD_MS  = 3000;  // countdown

        /* ──────────────────────── STATE */
        let GS        = null;
        let prevPhase = null;
        let rndTimer  = null;
        const gc = document.getElementById('gc');

        onValue(GREF, snap => {
            GS = snap.val() || {phase:'idle'};
            const changed = GS.phase !== prevPhase;
            if(changed && GS.phase !== 'round_active') clearRT();
            prevPhase = GS.phase;

            // Auto-advance P2 or P3 if everyone finished
            if (IS_DM && GS.phase === 'round_active') {
                if (GS.puzzle === 2) {
                    const votes = GS.votes || {};
                    if (Object.keys(votes).length === GAME_PLAYERS.length) endRound();
                } else if (GS.puzzle === 3) {
                    const wins = GS.p3Winners || {};
                    if (Object.keys(wins).length === 2) endRound();
                }
            }

            render(GS, changed);
        });

        function clearRT() { if(rndTimer){clearTimeout(rndTimer);rndTimer=null;} }

        /* ──────────────────────── GLOBAL EXPORTS */
        window.selPuzzle = selPuzzle;
        window.cancelGame = cancelGame;
        window.tapRdy = tapRdy;
        window.castVote = castVote;
        window.castVoteP2 = castVoteP2;
        window.castVoteP3 = castVoteP3;
        window.advance = advance;
        window.reset = reset;

        /* ──────────────────────── RENDER */
        function render(s,changed) {
            switch(s.phase){
                case 'idle':         rIdle();          break;
                case 'select':       rSelect(s);       break;
                case 'countdown':    rCD(s);           break;
                case 'round_active': rRound(s,changed);break;
                case 'round_reveal': rReveal(s);       break;
                case 'game_over':    rOver(s);         break;
                default:             rIdle();
            }
        }

        /* ── IDLE ── */
        function rIdle() {
            if(IS_DM) {
                gc.innerHTML=`
                <div style="text-align:center;max-width:300px">
                  <p class="ph-title" style="margin-bottom:28px">Choose a Trial</p>
                  <div class="pz-grid">
                    <button class="pz-card" onclick="selPuzzle(1)">
                      <div class="pz-name">Symbol Cipher</div>
                      <div class="pz-desc">Describe the unseen rune</div>
                    </button>
                    <button class="pz-card" onclick="selPuzzle(2)">
                      <div class="pz-name">Silent Sync</div>
                      <div class="pz-desc">Strike as one without speaking</div>
                    </button>
                    <button class="pz-card" onclick="selPuzzle(3)">
                      <div class="pz-name">Arcane Duel</div>
                      <div class="pz-desc">A fast-paced 1v1 tournament</div>
                    </button>
                  </div>
                </div>`;
            } else {
                gc.innerHTML=`
                <div style="text-align:center">
                  <div class="w-glyph">◈</div>
                  <p class="w-text">Awaiting the DM&rsquo;s trial&hellip;</p>
                </div>`;
            }
        }

        async function selPuzzle(n) {
            await set(GREF,{
                phase:'select', puzzle:n,
                gameSeed:((Math.random()*999983|0)+1),
                ready:null, round:0, teamScore:0, votes:null,
                phaseStart:Date.now()
            });
        }

        /* ── SELECT / READY ── */
        function rSelect(s) {
            const rdy   = s.ready||{};
            const allOk = GAME_PLAYERS.every(p=>rdy[p]);
            const meOk  = rdy[PLAYER_NAME];
            const rows  = GAME_PLAYERS.map(p=>`
              <div class="rdy-row ${rdy[p]?'yes':''}">
                <span class="rname">${p}</span>
                <span class="rstatus">${rdy[p]?'✓ Ready':'···'}</span>
              </div>`).join('');

            const titles = { 1: 'Symbol Cipher', 2: 'Silent Sync', 3: 'Arcane Duel' };
            const subsDM = { 1: 'Awaiting adventurers', 2: 'Awaiting the synched', 3: 'Awaiting the combatants' };
            const subsPl = { 1: 'A trial of communication awaits', 2: 'A trial of perfect timing', 3: 'A trial of speed and precision' };
            
            const title = titles[s.puzzle];
            const subDM = subsDM[s.puzzle];
            const subPl = subsPl[s.puzzle];

            if(IS_DM) {
                gc.innerHTML=`
                <div style="text-align:center;max-width:280px">
                  <p class="ph-title">${title}</p>
                  <p class="ph-sub">${subDM}</p>
                  <div class="rdy-list">${rows}</div>
                  <button class="btn-cancel" onclick="cancelGame()">✕ Cancel Trial</button>
                </div>`;
            } else {
                gc.innerHTML=`
                <div style="text-align:center;max-width:280px">
                  <p class="ph-title">${title}</p>
                  <p class="ph-sub">${subPl}</p>
                  <button class="btn-rdy ${meOk?'confirmed':''}"
                    onclick="tapRdy()" ${meOk?'disabled':''}>
                    ${meOk?'✓ Ready':'Ready?'}
                  </button>
                  <div class="rdy-list">${rows}</div>
                </div>`;
            }

            if(allOk && IS_DM) {
                setTimeout(()=>{
                    if(GS?.phase==='select')
                        update(GREF,{phase:'countdown',phaseStart:Date.now()});
                },700);
            }
        }

        async function tapRdy() { await update(RREF,{[PLAYER_NAME]:true}); }
        async function cancelGame() { await set(GREF,{phase:'idle'}); }

        /* ── COUNTDOWN ── */
        let cdTimer = null;
        function rCD(s) {
            if (cdTimer) clearTimeout(cdTimer);
            const tick=()=>{
                if (GS?.phase !== 'countdown') return;
                const el=Date.now()-s.phaseStart;
                const tl=Math.max(0,CD_MS-el);
                const n =tl>0?Math.ceil(tl/1000):'GO!';
                gc.innerHTML=`
                <div style="text-align:center">
                  <div class="cnt-num" id="cn">${n}</div>
                  <div class="cnt-label">Prepare yourselves</div>
                </div>`;
                if(tl<=0) {
                    if(IS_DM && GS?.phase==='countdown')
                        update(GREF,{phase:'round_active',phaseStart:Date.now(),votes:null});
                } else {
                    cdTimer = setTimeout(tick,90);
                }
            };
            tick();
        }

        /* ── ROUND ACTIVE ── */
        function rRound(s,changed) {
            const round  = s.round||0;
            const votes  = s.votes||{};
            const myVote = votes[PLAYER_NAME];
            const elapsed= Date.now()-s.phaseStart;

            const TOTAL_RNDS = s.puzzle === 1 ? 4 : (s.puzzle === 2 ? 3 : 2);
            const RND_MS_CUR = s.puzzle === 1 ? 5000 : (s.puzzle === 2 ? 10000 : 60000);
            const tl = Math.max(0, RND_MS_CUR - elapsed);

            if (s.puzzle === 1) {
                const {tgt,desc,layouts} = getRound(s.gameSeed, round);
                const amDesc = (PLAYER_NAME===desc);

                if(IS_DM) {
                    gc.innerHTML=`
                    <div class="dm-box">
                      <p class="rnd-bar">Round ${round+1} of ${TOTAL_RNDS}</p>
                      <div class="dm-sec" id="ds">${Math.ceil(tl/1000)}</div>
                      <p class="dm-desc-lbl">${desc} is describing</p>
                      <div class="dm-vlist">
                        ${GAME_PLAYERS.filter(p=>p!==desc).map(p=>`
                          <div class="dm-vrow ${votes[p]!==undefined?'voted':''}">
                            <span>${p}</span>
                            <span>${votes[p]!==undefined?'✓ Voted':'···'}</span>
                          </div>`).join('')}
                      </div>
                      <div class="timer-wrap" style="margin-top:6px">
                        <div class="timer-track">
                          <div class="timer-fill ${tl<2000?'urgent':''}" id="tb" style="width:${(tl/RND_MS_CUR)*100}%"></div>
                        </div>
                      </div>
                    </div>`;
                } else if(amDesc) {
                    gc.innerHTML=`
                    <div style="text-align:center;max-width:290px">
                      <p class="rnd-bar">Round ${round+1} of ${TOTAL_RNDS}</p>
                      <span class="role-badge role-desc">You are describing</span>
                      <div class="sym-lg">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                          ${S[tgt].svg}
                        </svg>
                      </div>
                      <p class="desc-instr">Describe this to your party!</p>
                      <div class="timer-wrap">
                        <div class="timer-track">
                          <div class="timer-fill ${tl<2000?'urgent':''}" id="tb" style="width:${(tl/RND_MS_CUR)*100}%"></div>
                        </div>
                        <div class="timer-sec" id="ts">${Math.ceil(tl/1000)}</div>
                      </div>
                    </div>`;
                } else {
                    const hand = layouts[PLAYER_NAME]||[];
                    gc.innerHTML=`
                    <div style="text-align:center;max-width:290px">
                      <p class="rnd-bar">Round ${round+1} of ${TOTAL_RNDS}</p>
                      <span class="role-badge role-guess">${desc} is describing&hellip;</span>
                      <div class="sym-grid">
                        ${hand.map(sid=>`
                          <button class="sym-btn ${myVote===sid?'selected':''}"
                            onclick="castVote(${sid})"
                            ${myVote!==undefined?'disabled':''}>
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                              ${S[sid].svg}
                            </svg>
                          </button>`).join('')}
                      </div>
                      <div class="timer-wrap">
                        <div class="timer-track">
                          <div class="timer-fill ${tl<2000?'urgent':''}" id="tb" style="width:${(tl/RND_MS_CUR)*100}%"></div>
                        </div>
                        <div class="timer-sec" id="ts">${Math.ceil(tl/1000)}</div>
                      </div>
                    </div>`;
                }
            } else if (s.puzzle === 2) {
                if (IS_DM) {
                    gc.innerHTML=`
                    <div class="dm-box">
                      <p class="rnd-bar">Round ${round+1} of ${TOTAL_RNDS}</p>
                      <div class="dm-sec" id="ds">${Math.ceil(tl/1000)}</div>
                      <p class="dm-desc-lbl">Players are synching...</p>
                      <div class="dm-vlist">
                        ${GAME_PLAYERS.map(p=>`
                          <div class="dm-vrow ${votes[p]!==undefined?'voted':''}">
                            <span>${p}</span>
                            <span>${votes[p]!==undefined?'✓ Locked':'···'}</span>
                          </div>`).join('')}
                      </div>
                      <div class="timer-wrap" style="margin-top:6px">
                        <div class="timer-track">
                          <div class="timer-fill ${tl<2000?'urgent':''}" id="tb" style="width:${(tl/RND_MS_CUR)*100}%"></div>
                        </div>
                      </div>
                    </div>`;
                } else {
                    gc.innerHTML=`
                    <div style="text-align:center;max-width:290px">
                      <p class="rnd-bar">Round ${round+1} of ${TOTAL_RNDS}</p>
                      <p class="desc-instr" style="margin-bottom:0">Strike precisely together.</p>
                      <button class="btn-strike ${myVote!==undefined?'confirmed':''}" onclick="castVoteP2()" ${myVote!==undefined?'disabled':''}>
                        ${myVote!==undefined?'✓':'STRIKE'}
                      </button>
                      <div class="timer-wrap">
                        <div class="timer-track">
                          <div class="timer-fill ${tl<2000?'urgent':''}" id="tb" style="width:${(tl/RND_MS_CUR)*100}%"></div>
                        </div>
                        <div class="timer-sec" id="ts">${Math.ceil(tl/1000)}</div>
                      </div>
                    </div>`;
                }
            } else if (s.puzzle === 3) {
                const { m0, m1, matchId, opp } = getTourney(s);
                const scores = s.p3Scores || {};
                const s0a = scores[m0[0]]||0, s0b = scores[m0[1]]||0;
                const s1a = scores[m1[0]]||0, s1b = scores[m1[1]]||0;
                
                if (IS_DM) {
                    gc.innerHTML=`
                    <div class="dm-box">
                      <p class="rnd-bar">${round===0 ? 'Semifinals' : 'Finals'}</p>
                      <div class="dm-sec" id="ds">${Math.ceil(tl/1000)}</div>
                      
                      <div style="width:100%; margin-top:10px;">
                         <p style="font-size:12px; color:var(--ac); text-transform:uppercase; margin-bottom:4px;">${round===0?'Match 1':'Gold Match'}</p>
                         <div style="display:flex; justify-content:space-between; font-size:11px;">
                            <span style="color:${s.p3Winners?.m0 === m0[0] ? '#44ff78' : ''}">${m0[0]}: ${s0a}/5</span>
                            <span style="color:${s.p3Winners?.m0 === m0[1] ? '#44ff78' : ''}">${m0[1]}: ${s0b}/5</span>
                         </div>
                         <div style="height:6px; border-radius:3px; background:rgba(255,255,255,0.1); margin:4px 0 16px; display:flex; overflow:hidden;">
                            <div style="width:${(s0a/5)*50}%; background:var(--ac); transition:0.2s;"></div>
                            <div style="flex-grow:1;"></div>
                            <div style="width:${(s0b/5)*50}%; background:#ff4455; transition:0.2s;"></div>
                         </div>

                         <p style="font-size:12px; color:var(--ac); text-transform:uppercase; margin-bottom:4px;">${round===0?'Match 2':'Bronze Match'}</p>
                         <div style="display:flex; justify-content:space-between; font-size:11px;">
                            <span style="color:${s.p3Winners?.m1 === m1[0] ? '#44ff78' : ''}">${m1[0]}: ${s1a}/5</span>
                            <span style="color:${s.p3Winners?.m1 === m1[1] ? '#44ff78' : ''}">${m1[1]}: ${s1b}/5</span>
                         </div>
                         <div style="height:6px; border-radius:3px; background:rgba(255,255,255,0.1); margin:4px 0 16px; display:flex; overflow:hidden;">
                            <div style="width:${(s1a/5)*50}%; background:var(--ac); transition:0.2s;"></div>
                            <div style="flex-grow:1;"></div>
                            <div style="width:${(s1b/5)*50}%; background:#ff4455; transition:0.2s;"></div>
                         </div>
                      </div>
                    </div>`;
                } else {
                    const amDone = s.p3Winners?.[matchId] !== undefined;
                    const iWon = s.p3Winners?.[matchId] === PLAYER_NAME;
                    
                    if (amDone) {
                        gc.innerHTML=`
                        <div style="text-align:center;">
                          <div class="w-glyph">◈</div>
                          <p class="ph-title" style="color:${iWon?'#44ff78':'#ff4455'}; text-shadow:0 0 18px ${iWon?'rgba(68,255,120,0.4)':'rgba(255,68,85,0.4)'}">${iWon ? 'Victory!' : 'Defeated'}</p>
                          <p class="w-text">Waiting for the other duel to finish...</p>
                        </div>`;
                    } else {
                        const myScore = scores[PLAYER_NAME] || 0;
                        const oppScore = scores[opp] || 0;
                        const { tgt, opts } = getDuelSyms(s.gameSeed, round, PLAYER_NAME, myScore);
                        
                        gc.innerHTML=`
                        <div style="text-align:center;max-width:290px; width:100%">
                          <p class="rnd-bar">${round===0 ? 'Semifinals' : (matchId==='m0' ? 'Gold Match' : 'Bronze Match')}</p>
                          <div style="display:flex; justify-content:space-between; margin-bottom:16px; font-size:14px; color:var(--ac); text-transform:uppercase; letter-spacing:2px;">
                             <span>You: ${myScore}/5</span>
                             <span>${opp}: ${oppScore}/5</span>
                          </div>
                          <div class="sym-lg" style="width:110px; height:110px; margin: 0 auto 20px; color:#fff; filter:drop-shadow(0 0 10px rgba(255,255,255,0.3));">
                             <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${S[tgt].svg}</svg>
                          </div>
                          <div class="sym-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 24px;">
                            ${opts.map(sid=>`
                              <button class="sym-btn" onclick="castVoteP3(${sid})">
                                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${S[sid].svg}</svg>
                              </button>`).join('')}
                          </div>
                          <div class="timer-wrap">
                            <div class="timer-track">
                              <div class="timer-fill ${tl<10000?'urgent':''}" id="tb" style="width:${(tl/RND_MS_CUR)*100}%"></div>
                            </div>
                            <div class="timer-sec" id="ts">${Math.ceil(tl/1000)}</div>
                          </div>
                        </div>`;
                    }
                }
            }

            if(changed || rndTimer===null) {
                clearRT();
                rndTimer = setInterval(()=>{
                    const el2=Date.now()-GS.phaseStart;
                    const tl2=Math.max(0,RND_MS_CUR-el2);
                    const bar=document.getElementById('tb');
                    const sec=document.getElementById('ts')||document.getElementById('ds');
                    if(bar){bar.style.width=(tl2/RND_MS_CUR)*100+'%';bar.classList.toggle('urgent',tl2<2000);}
                    if(sec) sec.textContent=Math.ceil(tl2/1000);
                    if(tl2<=0){
                        clearRT();
                        if(IS_DM) endRound();
                    }
                },80);
            }
        }

        async function castVote(sid) {
            if(!GS||GS.phase!=='round_active') return;
            if(GS.votes?.[PLAYER_NAME]!==undefined) return;
            await update(VREF,{[PLAYER_NAME]:sid});
        }

        async function castVoteP2() {
            if(!GS||GS.phase!=='round_active') return;
            if(GS.votes?.[PLAYER_NAME]!==undefined) return;
            await update(VREF,{[PLAYER_NAME]: serverTimestamp()});
        }

        let isClickingP3 = false;
        async function castVoteP3(sid) {
            if(!GS || GS.phase !== 'round_active' || isClickingP3) return;
            const { matchId } = getTourney(GS);
            if(GS.p3Winners && GS.p3Winners[matchId]) return;
            
            isClickingP3 = true;
            const scores = GS.p3Scores || {};
            let myScore = scores[PLAYER_NAME] || 0;
            const { tgt } = getDuelSyms(GS.gameSeed, GS.round||0, PLAYER_NAME, myScore);
            
            if (sid === tgt) myScore++;
            else myScore = Math.max(0, myScore - 1);
            
            const updates = { [`p3Scores/${PLAYER_NAME}`]: myScore };
            if (myScore >= 5) updates[`p3Winners/${matchId}`] = PLAYER_NAME;
            
            await update(GREF, updates);
            setTimeout(() => { isClickingP3 = false; }, 150);
        }

        function endRound() {
            if(GS?.phase!=='round_active') return;
            const round=GS.round||0;

            if (GS.puzzle === 1) {
                const {tgt,desc}=getRound(GS.gameSeed, round);
                const votes=GS.votes||{};
                const guessers=GAME_PLAYERS.filter(p=>p!==desc);
                const correct=guessers.filter(p=>votes[p]===tgt).length;
                const majority=correct>guessers.length/2;
                const score=(GS.teamScore||0)+(majority?1:0);
                update(GREF,{phase:'round_reveal',phaseStart:Date.now(),teamScore:score});
            } else if (GS.puzzle === 2) {
                const votes = GS.votes || {};
                const times = GAME_PLAYERS.map(p => votes[p] || 0);
                const min = Math.min(...times);
                const max = Math.max(...times);
                let score = 0;
                let diff = 99999;
                if (min > 0) {
                    diff = max - min;
                    if (diff <= 200) score = 100;
                    else if (diff <= 500) score = 80;
                    else if (diff <= 1000) score = 50;
                    else if (diff <= 2000) score = 20;
                    else score = 10;
                }
                const newScore = (GS.teamScore || 0) + score;
                update(GREF, { phase: 'round_reveal', phaseStart: Date.now(), teamScore: newScore, lastDiff: diff });
            } else if (GS.puzzle === 3) {
                const t = getTourney(GS);
                const scores = GS.p3Scores || {};
                const winners = GS.p3Winners || {};
                ['m0', 'm1'].forEach(mid => {
                    if (!winners[mid]) {
                        const m = mid === 'm0' ? t.m0 : t.m1;
                        const s0 = scores[m[0]] || 0;
                        const s1 = scores[m[1]] || 0;
                        winners[mid] = s0 >= s1 ? m[0] : m[1]; 
                    }
                });
                update(GREF, { phase: 'round_reveal', phaseStart: Date.now(), p3Winners: winners });
            }
        }

        /* ── ROUND REVEAL ── */
        function rReveal(s) {
            const round=s.round||0;

            if (s.puzzle === 1) {
                const {tgt,desc}=getRound(s.gameSeed, round);
                const votes=s.votes||{};
                const guessers=GAME_PLAYERS.filter(p=>p!==desc);
                const correct=guessers.filter(p=>votes[p]===tgt).length;
                const majority=correct>guessers.length/2;
                const last=round>=3;

                const rows=guessers.map(p=>{
                    const ok=votes[p]===tgt;
                    return `<div class="rv-row ${ok?'ok':'bad'}">
                      <span>${p}</span>
                      <span>${ok?'✓ Correct':(votes[p]!==undefined?'✗ Wrong':'✗ No answer')}</span>
                    </div>`;
                }).join('');

                gc.innerHTML=`
                <div style="text-align:center;max-width:290px">
                  <p class="rnd-bar">Round ${round+1} — The symbol was&hellip;</p>
                  <div class="rv-sym">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${S[tgt].svg}</svg>
                  </div>
                  <p class="ph-title" style="margin-bottom:6px">${S[tgt].name}</p>
                  <div class="rv-outcome ${majority?'win':'lose'}">${majority?'Success':'Failed'}</div>
                  <div class="rv-rows">${rows}</div>
                  <p class="score-line">Score: ${s.teamScore} / ${round+1}</p>
                  ${IS_DM
                    ?`<button class="btn-action" onclick="advance()">${last?'Final Scores &rarr;':'Next Round &rarr;'}</button>`
                    :`<p class="w-text" style="font-size:11px;letter-spacing:2px">Waiting for DM&hellip;</p>`
                  }
                </div>`;
            } else if (s.puzzle === 2) {
                const last = round >= 2;
                const diff = s.lastDiff;
                const votes = s.votes || {};
                let diffText = diff > 10000 ? "Failed" : (diff / 1000).toFixed(3) + "s";
                let winClass = diff <= 500 ? 'win' : (diff > 2000 ? 'lose' : '');

                const minVote = Math.min(...Object.values(votes).filter(v=>v));
                const rows = GAME_PLAYERS.map(p => {
                    const v = votes[p];
                    const offset = v ? ((v - minVote)/1000).toFixed(3) + "s" : "No answer";
                    return `<div class="rv-row ${v?'ok':'bad'}">
                      <span>${p}</span>
                      <span>${offset === "0.000s" ? "Earliest" : "+" + offset}</span>
                    </div>`;
                }).join('');

                gc.innerHTML=`
                <div style="text-align:center;max-width:290px">
                  <p class="rnd-bar">Round ${round+1} — Time Difference</p>
                  <p class="ph-title" style="margin-bottom:6px; font-size:28px">${diffText}</p>
                  <div class="rv-outcome ${winClass}">${diff <= 200 ? 'Perfect!' : diff <= 1000 ? 'Good' : 'Too far apart'}</div>
                  <div class="rv-rows">${rows}</div>
                  <p class="score-line">Total Score: ${s.teamScore}</p>
                  ${IS_DM
                    ?`<button class="btn-action" onclick="advance()">${last?'Final Scores &rarr;':'Next Round &rarr;'}</button>`
                    :`<p class="w-text" style="font-size:11px;letter-spacing:2px">Waiting for DM&hellip;</p>`
                  }
                </div>`;
            } else if (s.puzzle === 3) {
                const { m0, m1 } = getTourney(s);
                const scores = s.p3Scores || {};
                const win0 = s.p3Winners?.m0;
                const win1 = s.p3Winners?.m1;
                const last = round >= 1;

                const rowHTML = (p) => {
                    const isWin = (p === win0 || p === win1);
                    return `<div class="rv-row ${isWin ? 'ok' : 'bad'}">
                        <span>${p}</span>
                        <span>${scores[p]||0} points ${isWin ? '(Win)' : ''}</span>
                    </div>`;
                };

                gc.innerHTML=`
                <div style="text-align:center;max-width:290px; width:100%;">
                  <p class="rnd-bar">${round===0 ? 'Semifinals Complete' : 'Tournament Concluded'}</p>
                  <p class="ph-title" style="margin-bottom:16px;">Results</p>
                  
                  <div class="rv-rows" style="margin-bottom:10px;">
                     ${rowHTML(m0[0])}
                     ${rowHTML(m0[1])}
                  </div>
                  <div class="rv-rows" style="margin-bottom:20px;">
                     ${rowHTML(m1[0])}
                     ${rowHTML(m1[1])}
                  </div>
                  
                  ${IS_DM
                    ?`<button class="btn-action" onclick="advance()">${last?'Final Standings &rarr;':'Next Round &rarr;'}</button>`
                    :`<p class="w-text" style="font-size:11px;letter-spacing:2px">Waiting for DM&hellip;</p>`
                  }
                </div>`;
            }
        }

        async function advance() {
            const round=GS?.round||0;
            const maxRounds = GS?.puzzle === 1 ? 3 : (GS?.puzzle === 2 ? 2 : 1); 
            if(round >= maxRounds) {
                if (GS?.puzzle === 3 && round === 1) {
                    const t = getTourney(GS);
                    const first = GS.p3Winners?.m0;
                    const second = t.m0[0] === first ? t.m0[1] : t.m0[0];
                    const third = GS.p3Winners?.m1;
                    const fourth = t.m1[0] === third ? t.m1[1] : t.m1[0];
                    await update(GREF, {
                        phase: 'game_over', phaseStart: Date.now(),
                        tourney: { ...GS.tourney, first, second, third, fourth }
                    });
                } else {
                    await update(GREF,{phase:'game_over',phaseStart:Date.now()});
                }
            } else {
                if (GS?.puzzle === 3 && round === 0) {
                    const t = getTourney(GS);
                    const w0 = GS.p3Winners?.m0;
                    const l0 = t.m0[0] === w0 ? t.m0[1] : t.m0[0];
                    const w1 = GS.p3Winners?.m1;
                    const l1 = t.m1[0] === w1 ? t.m1[1] : t.m1[0];
                    await update(GREF, {
                        phase: 'countdown', round: 1, phaseStart: Date.now(),
                        p3Scores: null, p3Winners: null,
                        tourney: { w0, l0, w1, l1 }
                    });
                } else {
                    await update(GREF,{phase:'countdown',round:round+1,phaseStart:Date.now(),votes:null});
                }
            }
        }

        /* ── GAME OVER ── */
        function rOver(s) {
            const score=s.teamScore||0;
            if (s.puzzle === 1) {
                const tiers=[
                    [4,'Perfect Cipher!','Your bonds are unbreakable'],
                    [3,'Strong Bond',    'Your communication shines'],
                    [2,'Partial Success','Some signals were lost'],
                    [1,'Struggling',     'The cipher proved difficult'],
                    [0,'Cipher Failed',  'The darkness claims this trial'],
                ];
                const [,title,sub]=tiers.find(([m])=>score>=m);
                gc.innerHTML=`
                <div style="text-align:center;max-width:280px">
                  <p class="go-head">Trial Complete</p>
                  <div class="go-score">${score}<span class="go-max"> / 4</span></div>
                  <p class="go-title">${title}</p>
                  <p class="go-sub">${sub}</p>
                  ${IS_DM?`<button class=\"btn-action\" onclick=\"reset()\">Play Again</button>`:''}
                </div>`;
            } else if (s.puzzle === 2) {
                const tiers=[
                    [280,'Mind Link',     'Flawless synchrony'],
                    [200,'Harmonious',    'Strong timing'],
                    [100,'Fragmented',    'Your signals crossed'],
                    [0,  'Desynced',      'The darkness claimed your rhythm'],
                ];
                const [,title,sub]=tiers.find(([m])=>score>=m);
                gc.innerHTML=`
                <div style="text-align:center;max-width:280px">
                  <p class="go-head">Trial Complete</p>
                  <div class="go-score">${score}<span class="go-max" style="font-size:22px"> / 300</span></div>
                  <p class="go-title">${title}</p>
                  <p class="go-sub">${sub}</p>
                  ${IS_DM?`<button class=\"btn-action\" onclick=\"reset()\">Play Again</button>`:''}
                </div>`;
            } else if (s.puzzle === 3) {
                const t = s.tourney || {};
                gc.innerHTML=`
                <div style="text-align:center;max-width:280px; width:100%">
                  <p class="go-head">Arcane Duel Complete</p>
                  
                  <div style="display:flex; flex-direction:column; gap:8px; margin: 24px 0;">
                     <div class="rv-row ok" style="font-size:14px; padding:14px;">
                         <span style="color:#ffc832;">👑 1st Place</span>
                         <span style="font-weight:bold;">${t.first}</span>
                     </div>
                     <div class="rv-row" style="font-size:13px; background:rgba(255,255,255,0.08);">
                         <span>2nd Place</span><span>${t.second}</span>
                     </div>
                     <div class="rv-row" style="font-size:12px; background:rgba(255,255,255,0.04);">
                         <span>3rd Place</span><span>${t.third}</span>
                     </div>
                     <div class="rv-row bad" style="font-size:11px;">
                         <span>4th Place</span><span>${t.fourth}</span>
                     </div>
                  </div>
                  
                  ${IS_DM?`<button class=\"btn-action\" onclick=\"reset()\">Play Again</button>`:''}
                </div>`;
            }
        }

        async function reset() { await set(GREF,{phase:'idle'}); }

    </script>
</body>
</html>
